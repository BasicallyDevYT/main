<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GD Dashboard</title>
  <style>
    /* GD Styling & Background Colors */
    body {
      font-family: Arial, sans-serif;
      background-color: #1a0f0a; 
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      box-sizing: border-box;
    }

    /* Main GD Account Plate */
    .gd-panel {
      background-color: #bf6f3a; /* Iconic brown panel background */
      border: 5px solid #000000;
      border-radius: 16px;
      padding: 20px;
      width: 600px;
      max-width: 90%;
      box-shadow: inset 0 0 15px rgba(0,0,0,0.4), 0 8px 16px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      gap: 15px;
      position: relative;
    }

    /* Top Row: User Name & Badges */
    .gd-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      position: relative;
    }

    .username-title {
      font-size: 2.5rem;
      font-weight: bold;
      color: #ffffff;
      text-transform: uppercase;
      text-shadow: 
        -3px -3px 0 #000,  
         3px -3px 0 #000,
        -3px  3px 0 #000,
         3px  3px 0 #000;
      letter-spacing: 2px;
      margin: 0;
    }

    /* GD Badge: Aligned like the mod icon in GD */
    .gd-badge {
      width: 38px;
      height: 38px;
      display: none; /* Injected by JS */
      object-fit: contain; /* Prevents any cropping */
    }

    /* Stats Grid Bar */
    .gd-stats-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      font-weight: bold;
      font-size: 1.1rem;
      text-shadow: 2px 2px 0px #000000;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* Placeholder Icons Row Container */
    .gd-icons-container {
      background-color: #a15525;
      border: 3px solid #603010;
      border-radius: 12px;
      padding: 10px;
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .gd-icon-box {
      width: 45px;
      height: 45px;
      background-color: #123015; /* Green GD default template color */
      border: 2px solid #000000;
      border-radius: 6px;
    }

    /* Custom Message Box Container */
    .gd-message-box {
      background-color: #834015;
      border: 3px solid #5a2a0a;
      border-radius: 12px;
      padding: 15px;
      text-align: left;
      min-height: 80px;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
    }

    .message-title {
      font-weight: bold;
      color: #ffc83b;
      font-size: 1.1rem;
      text-shadow: 1.5px 1.5px 0px #000000;
      margin-bottom: 5px;
    }

    .message-body {
      color: #ffffff;
      font-size: 0.95rem;
      line-height: 1.4;
      text-shadow: 1px 1px 0px #000000;
    }

    /* GD-Styled Signout Button (Styled like red navigation actions) */
    .signout-container {
      display: flex;
      justify-content: center;
      margin-top: 5px;
    }

    .gd-btn-red {
      background-color: #da373c;
      color: #ffffff;
      border: 3px solid #000000;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 0px #000000;
      transition: transform 0.1s, background-color 0.2s;
    }

    .gd-btn-red:hover {
      background-color: #bc2f34;
    }

    .gd-btn-red:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0px #000000;
    }
  </style>

  <script>
    // --- Global Path Configurations ---
    const ICON_BASE = "https://basicallydevyt.github.io/main/WebsiteIcons/";
    const ROLES_JSON_URL = "https://basicallydevyt.github.io/main/AccountService/roles.json";

    // --- Cookie State Reader ---
    function getSessionCookie() {
      let ca = document.cookie.split(';');
      for(let i=0; i < ca.length; i++) {
        let c = ca[i].trim();
        if (c.indexOf("discord_session=") == 0) {
          return JSON.parse(decodeURIComponent(c.substring("discord_session=".length)));
        }
        if (c.indexOf("user_session=") == 0) {
          return JSON.parse(decodeURIComponent(c.substring("user_session=".length)));
        }
      }
      return null;
    }

    function signOut() {
      document.cookie = "discord_session=; path=/main/; expires=Thu, 01 Jan 1970 00:00:00 GMT";
      document.cookie = "user_session=; path=/main/; expires=Thu, 01 Jan 1970 00:00:00 GMT";
      window.location.href = "https://basicallydevyt.github.io/main/AccountService/";
    }

    // --- Dynamic Profile Engine ---
    window.addEventListener('DOMContentLoaded', async function() {
      const user = getSessionCookie();
      
      // Kick out users without an active session
      if (!user) {
        window.location.href = "https://basicallydevyt.github.io/main/AccountService/";
        return;
      }

      // Populate basic details right away
      document.getElementById('username').textContent = user.name;

      const badgeImg = document.getElementById('display-badge');
      const msgTitle = document.getElementById('msg-title');
      const msgBody = document.getElementById('msg-body');

      try {
        const response = await fetch(ROLES_JSON_URL);
        if (!response.ok) throw new Error("Could not load privileges file");
        const roles = await response.json();

        const usernameLower = user.name.toLowerCase();

        // Check Creator Level
        if (roles.creator && roles.creator.map(u => u.toLowerCase()).includes(usernameLower)) {
          badgeImg.src = ICON_BASE + "Creator.png";
          badgeImg.style.display = "block";
          msgTitle.textContent = user.name;
          msgBody.textContent = "Welcome back, Boss! Everything is verified, clean, and running smoothly.";
        } 
        // Check Moderator Structure
        else if (roles.moderators && roles.moderators[user.name]) {
          const modType = roles.moderators[user.name].toLowerCase();
          
          if (modType === "elder") {
            badgeImg.src = ICON_BASE + "ElderModerator.webp";
            msgBody.textContent = "You are currently logged in with Elder Moderator administrative access.";
          } else if (modType === "trusted") {
            badgeImg.src = ICON_BASE + "LeaderboardModerator.webp";
            msgBody.textContent = "You are currently logged in with Trusted Moderator administrative access.";
          } else {
            badgeImg.src = ICON_BASE + "Moderator.webp";
            msgBody.textContent = "You are currently logged in with Moderator administrative access.";
          }
          badgeImg.style.display = "block";
          msgTitle.textContent = user.name;
        } 
        // Check Featured Lists
        else if (roles.featured && roles.featured.map(u => u.toLowerCase()).includes(usernameLower)) {
          badgeImg.src = ICON_BASE + "Featured.png";
          badgeImg.style.display = "block";
          msgTitle.textContent = user.name;
          msgBody.textContent = "Welcome! You are on our featured list. Thank you for your continued support!";
        } 
        // Default Base User Tier
        else {
          msgTitle.textContent = user.name;
          msgBody.textContent = "Welcome to your GD dashboard profile! Check out your custom configuration panels.";
        }

      } catch (err) {
        console.error("Privilege lookup failed, applying safe fallbacks:", err);
        badgeImg.src = ICON_BASE + "Error.png"; // Safely loads error badge without cropping
        badgeImg.style.display = "block";
        msgTitle.textContent = "ERROR DETECTED";
        msgBody.textContent = "Failed to synchronize status with server. Roles are unavailable right now.";
      }
    });
  </script>
</head>
<body>

  <div class="gd-panel">
    
    <div class="gd-header">
      <img id="display-badge" class="gd-badge" src="" alt="Badge">
      <h2 id="username" class="username-title">LOADING...</h2>
    </div>

    <div class="gd-stats-bar">
      <div class="stat-item"><span style="color: #ffeb3b;">★</span> 14,926</div>
      <div class="stat-item"><span style="color: #4fc3f7;">☾</span> 97</div>
      <div class="stat-item"><span style="color: #ffd54f;">✪</span> 162</div>
      <div class="stat-item"><span style="color: #e0e0e0;">⬤</span> 1,696</div>
      <div class="stat-item"><span style="color: #ff5252;">👹</span> 27</div>
    </div>

    <div class="gd-icons-container">
      <div class="gd-icon-box" style="background-color: #2e7d32;"></div>
      <div class="gd-icon-box" style="background-color: #2e7d32;"></div>
      <div class="gd-icon-box" style="background-color: #2e7d32;"></div>
      <div class="gd-icon-box" style="background-color: #2e7d32;"></div>
      <div class="gd-icon-box" style="background-color: #2e7d32;"></div>
    </div>

    <div class="gd-message-box">
      <div id="msg-title" class="message-title">Connecting...</div>
      <div id="msg-body" class="message-body">Waiting for active session handshake...</div>
    </div>

    <div class="signout-container">
      <button class="gd-btn-red" onclick="signOut()">Sign out</button>
    </div>

  </div>

</body>
</html>
