<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <style>
    /* Sleek, Jet-Black Modern Aesthetic */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #09090b;
      color: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      box-sizing: border-box;
    }

    /* Minimalist Profile Card */
    .profile-card {
      background-color: #121214;
      border: 1px solid #27272a;
      border-radius: 16px;
      padding: 32px;
      width: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
    }

    /* Profile Avatar Container */
    .avatar-wrapper {
      position: relative;
      display: inline-block;
    }

    .user-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 2px solid #27272a;
      object-fit: cover;
      background-color: #1c1c1e;
    }

    /* Absolute Center/Corner Layout for Badge (Uncropped) */
    .role-badge {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 32px;
      height: 32px;
      display: none;
      object-fit: contain;
      background: #121214;
      border-radius: 50%;
      border: 2px solid #27272a;
      padding: 2px;
    }

    /* Username & Role Text styling */
    .user-name {
      font-size: 1.5rem;
      font-weight: 700;
      color: #ffffff;
      margin: 0;
      letter-spacing: -0.5px;
      text-align: center;
    }

    .role-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #a1a1aa;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 0;
    }

    /* Navigation Action Buttons Group */
    .button-group {
      display: flex;
      width: 100%;
      gap: 12px;
      margin-top: 12px;
    }

    .btn {
      flex: 1;
      padding: 10px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    /* Exit Button Style */
    .btn-exit {
      background-color: transparent;
      color: #fafafa;
      border: 1px solid #27272a;
    }

    .btn-exit:hover {
      background-color: #1c1c1e;
      border-color: #3f3f46;
    }

    /* Sign Out Button Style */
    .btn-signout {
      background-color: #ff453a;
      color: #ffffff;
      border: 1px solid transparent;
    }

    .btn-signout:hover {
      background-color: #ff3b30;
    }
  </style>

  <script>
    const ICON_BASE = "https://basicallydevyt.github.io/main/WebsiteIcons/";
    const ROLES_JSON_URL = "roles.json";
    const AUTH_REDIRECT_URL = "https://basicallydevyt.github.io/main/AccountService/?signout=main/Dashboard";

    // Reads ONLY the global user_session cookie
    function getGlobalSessionCookie() {
      let ca = document.cookie.split(';');
      for(let i=0; i < ca.length; i++) {
        let c = ca[i].trim();
        if (c.indexOf("user_session=") == 0) {
          return JSON.parse(decodeURIComponent(c.substring("user_session=".length)));
        }
      }
      return null;
    }

    // Erases the cookie safely by setting it to expire immediately
    function handleSignOut() {
      window.location.href = AUTH_REDIRECT_URL;
    }

    window.addEventListener('DOMContentLoaded', async function() {
      const user = getGlobalSessionCookie();
      
      // If global cookie is missing completely, send to login
      if (!user) {
        window.location.href = AUTH_REDIRECT_URL;
        return;
      }

      // Populate interface data
      document.getElementById('username').textContent = user.name;
      document.getElementById('display-avatar').src = user.avatar || 'https://www.gstatic.com/images/branding/product/2x/avatar_anonymous_64dp.png';

      const badgeImg = document.getElementById('display-badge');
      const roleTxt = document.getElementById('role-display');

      try {
        const response = await fetch(ROLES_JSON_URL);
        if (!response.ok) throw new Error("Could not load privileges");
        const roles = await response.json();

        const platform = String(user.provider || '').toLowerCase().trim(); 
        let roleFound = "Member"; 

        if (platform === 'discord') {
          const discordId = user.id;
          
          if (roles.creator && roles.creator.discord && roles.creator.discord.includes(discordId)) {
            roleFound = "Creator";
          } else if (roles.moderators && roles.moderators.discord && roles.moderators.discord[discordId]) {
            roleFound = roles.moderators.discord[discordId];
          } else if (roles.featured && roles.featured.discord && roles.featured.discord.includes(discordId)) {
            roleFound = "Featured";
          }
        } 
        else if (platform === 'google' && user.email) {
          const rawUserEmail = String(user.email).toLowerCase().trim();
          
          // 1. Check Creator List
          const isCreator = roles.creator && roles.creator.google && roles.creator.google.some(encodedEmail => {
            try {
              return atob(encodedEmail).toLowerCase().trim() === rawUserEmail;
            } catch(e) { return false; }
          });
          if (isCreator) roleFound = "Creator";

          // 2. Check Moderator Objects
          if (roleFound === "Member" && roles.moderators && roles.moderators.google) {
            for (const encodedEmail in roles.moderators.google) {
              try {
                if (atob(encodedEmail).toLowerCase().trim() === rawUserEmail) {
                  roleFound = roles.moderators.google[encodedEmail];
                  break;
                }
              } catch(e) {}
            }
          }

          // 3. Check Featured Lists
          if (roleFound === "Member" && roles.featured && roles.featured.google) {
            const isFeatured = roles.featured.google.some(encodedEmail => {
              try {
                return atob(encodedEmail).toLowerCase().trim() === rawUserEmail;
              } catch(e) { return false; }
            });
            if (isFeatured) roleFound = "Featured";
          }
        }

        // --- Apply UI Assets based on resolved role string ---
        const cleanRole = String(roleFound).toLowerCase().trim();

        if (cleanRole === "creator") {
          badgeImg.src = ICON_BASE + "Creator.png";
          badgeImg.style.display = "block";
          roleTxt.textContent = "Creator";
          roleTxt.style.color = "#ff4500";
        } else if (cleanRole === "elder") {
          badgeImg.src = ICON_BASE + "ElderModerator.webp";
          badgeImg.style.display = "block";
          roleTxt.textContent = "Elder Moderator";
          roleTxt.style.color = "#ff2d55";
        } else if (cleanRole === "trusted") {
          badgeImg.src = ICON_BASE + "LeaderboardModerator.webp";
          badgeImg.style.display = "block";
          roleTxt.textContent = "Trusted Moderator";
          roleTxt.style.color = "#af52de";
        } else if (cleanRole === "moderator" || cleanRole === "normal") {
          badgeImg.src = ICON_BASE + "Moderator.webp";
          badgeImg.style.display = "block";
          roleTxt.textContent = "Moderator";
          roleTxt.style.color = "#34c759";
        } else if (cleanRole === "featured") {
          badgeImg.src = ICON_BASE + "Featured.png";
          badgeImg.style.display = "block";
          roleTxt.textContent = "Featured User";
          roleTxt.style.color = "#ffcc00";
        } else {
          roleTxt.textContent = "Member";
          roleTxt.style.color = "#a1a1aa";
        }

      } catch (err) {
        console.error("Privilege lookup failed:", err);
        badgeImg.src = ICON_BASE + "Error.png"; 
        badgeImg.style.display = "block";
        roleTxt.textContent = "Error Loading Roles";
        roleTxt.style.color = "#ff453a";
      }
    });
  </script>
</head>
<body>

  <div class="profile-card">
    <div class="avatar-wrapper">
      <img id="display-avatar" class="user-avatar" src="" alt="Avatar">
      <img id="display-badge" class="role-badge" src="" alt="Badge">
    </div>
    
    <h2 id="username" class="user-name">Loading...</h2>
    <div id="role-display" class="role-label">Connecting...</div>

    <div class="button-group">
      <a href="https://basicallydevyt.github.io/main/" class="btn btn-exit">Exit</a>
      <button onclick="handleSignOut()" class="btn btn-signout">Sign Out</button>
    </div>
  </div>

</body>
</html>
