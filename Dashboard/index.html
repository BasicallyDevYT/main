<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <style>
    /* Sleek, Jet-Black Modern Aesthetic */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #09090b;
      color: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      box-sizing: border-box;
    }

    /* Minimalist Profile Card */
    .profile-card {
      background-color: #121214;
      border: 1px solid #27272a;
      border-radius: 16px;
      padding: 32px;
      width: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
    }

    /* Profile Avatar Container */
    .avatar-wrapper {
      position: relative;
      display: inline-block;
    }

    .user-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 2px solid #27272a;
      object-fit: cover;
      background-color: #1c1c1e;
    }

    /* Badge Overlay Layout */
    .role-badge {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 32px;
      height: 32px;
      display: none; /* Shown dynamically via JS */
      object-fit: contain; /* Prevents cropping */
      background: #121214;
      border-radius: 50%;
      border: 2px solid #27272a;
      padding: 2px;
    }

    /* Username & Role Text styling */
    .user-name {
      font-size: 1.5rem;
      font-weight: 700;
      color: #ffffff;
      margin: 0;
      letter-spacing: -0.5px;
      text-align: center;
    }

    .role-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #a1a1aa;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 0;
    }
  </style>

  <script>
    const ICON_BASE = "https://basicallydevyt.github.io/main/WebsiteIcons/";
    const ROLES_JSON_URL = "https://basicallydevyt.github.io/main/AccountService/roles.json";

    function getSessionCookie() {
      let ca = document.cookie.split(';');
      for(let i=0; i < ca.length; i++) {
        let c = ca[i].trim();
        if (c.indexOf("discord_session=") == 0) {
          return JSON.parse(decodeURIComponent(c.substring("discord_session=".length)));
        }
        if (c.indexOf("user_session=") == 0) {
          return JSON.parse(decodeURIComponent(c.substring("user_session=".length)));
        }
      }
      return null;
    }

    // Helper to resolve the user's ID regardless of platform state
    function getUserId(user) {
      if (user.id) return String(user.id);
      
      // Fallback: extract Discord ID from avatar URL if user.id is not stored directly
      if (user.provider === "discord" && user.avatar) {
        const match = user.avatar.match(/\/avatars\/(\d+)\//);
        if (match) return match[1];
      }
      
      return null;
    }

    window.addEventListener('DOMContentLoaded', async function() {
      const user = getSessionCookie();
      
      if (!user) {
        window.location.href = "https://basicallydevyt.github.io/main/AccountService/";
        return;
      }

      // Populate baseline details
      document.getElementById('username').textContent = user.name;
      document.getElementById('display-avatar').src = user.avatar || 'https://www.gstatic.com/images/branding/product/2x/avatar_anonymous_64dp.png';

      const badgeImg = document.getElementById('display-badge');
      const roleTxt = document.getElementById('role-display');

      const provider = user.provider ? user.provider.toLowerCase() : "discord";
      const userId = getUserId(user);

      try {
        const response = await fetch(ROLES_JSON_URL);
        if (!response.ok) throw new Error("Could not load roles file");
        const roles = await response.json();

        // 1. Check Creator Tier
        const creators = (roles.creator && roles.creator[provider]) || [];
        if (userId && creators.includes(userId)) {
          badgeImg.src = ICON_BASE + "Creator.png";
          badgeImg.style.display = "block";
          roleTxt.textContent = "Creator";
          roleTxt.style.color = "#ff4500";
        } 
        // 2. Check Moderator Tier
        else if (userId && roles.moderators && roles.moderators[provider] && roles.moderators[provider][userId]) {
          const modType = roles.moderators[provider][userId].toLowerCase();
          
          if (modType === "elder") {
            badgeImg.src = ICON_BASE + "ElderModerator.webp";
            roleTxt.textContent = "Elder Moderator";
            roleTxt.style.color = "#ff2d55";
          } else if (modType === "trusted") {
            badgeImg.src = ICON_BASE + "LeaderboardModerator.webp";
            roleTxt.textContent = "Trusted Moderator";
            roleTxt.style.color = "#af52de";
          } else {
            badgeImg.src = ICON_BASE + "Moderator.webp";
            roleTxt.textContent = "Moderator";
            roleTxt.style.color = "#34c759";
          }
          badgeImg.style.display = "block";
        } 
        // 3. Check Featured Tier
        else if (userId && roles.featured && roles.featured[provider] && roles.featured[provider].includes(userId)) {
          badgeImg.src = ICON_BASE + "Featured.png";
          badgeImg.style.display = "block";
          roleTxt.textContent = "Featured User";
          roleTxt.style.color = "#ffcc00";
        } 
        // 4. Default Base User Tier
        else {
          roleTxt.textContent = "Member";
          roleTxt.style.color = "#a1a1aa";
        }

      } catch (err) {
        console.error("Privilege lookup failed:", err);
        badgeImg.src = ICON_BASE + "Error.png"; // Shows full, uncropped error icon
        badgeImg.style.display = "block";
        roleTxt.textContent = "Error Loading Roles";
        roleTxt.style.color = "#ff453a";
      }
    });
  </script>
</head>
<body>

  <div class="profile-card">
    <div class="avatar-wrapper">
      <img id="display-avatar" class="user-avatar" src="" alt="Avatar">
      <img id="display-badge" class="role-badge" src="" alt="Badge">
    </div>
    
    <h2 id="username" class="user-name">Loading...</h2>
    <div id="role-display" class="role-label">Connecting...</div>
  </div>

</body>
</html>
