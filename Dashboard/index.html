<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <style>
    /* Sleek, Jet-Black Modern Aesthetic */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #09090b;
      color: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      box-sizing: border-box;
    }

    /* Minimalist Profile Card */
    .profile-card {
      background-color: #121214;
      border: 1px solid #27272a;
      border-radius: 16px;
      padding: 32px;
      width: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
    }

    /* Profile Avatar Container */
    .avatar-wrapper {
      position: relative;
      display: inline-block;
    }

    .user-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 2px solid #27272a;
      object-fit: cover;
      background-color: #1c1c1e;
    }

    /* Horizontal container layout for badge icons sitting next to each other */
    #badge-icon-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px; /* Clean gap so they never overlap or hide each other */
      width: 100%;
      margin-top: 4px;
    }

    /* Individual circular uncropped badge icon styling */
    .role-badge-icon {
      width: 32px;
      height: 32px;
      object-fit: contain;
      background: #121214;
      border-radius: 50%;
      border: 2px solid #27272a;
      padding: 2px;
    }

    /* Username Text styling */
    .user-name {
      font-size: 1.5rem;
      font-weight: 700;
      color: #ffffff;
      margin: 0;
      letter-spacing: -0.5px;
      text-align: center;
    }

    /* Fallback status label if user has no special badges */
    .fallback-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #a1a1aa;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 0;
    }

    /* Navigation Action Buttons Group */
    .button-group {
      display: flex;
      width: 100%;
      gap: 12px;
      margin-top: 12px;
    }

    .btn {
      flex: 1;
      padding: 10px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    /* Exit Button Style */
    .btn-exit {
      background-color: transparent;
      color: #fafafa;
      border: 1px solid #27272a;
    }

    .btn-exit:hover {
      background-color: #1c1c1e;
      border-color: #3f3f46;
    }

    /* Sign Out Button Style */
    .btn-signout {
      background-color: #ff453a;
      color: #ffffff;
      border: 1px solid transparent;
    }

    .btn-signout:hover {
      background-color: #ff3b30;
    }

    /* Sleek Blue Login Button Style */
    .btn-login {
      display: block;
      width: 100%;
      background-color: #007aff;
      color: #ffffff;
      border: 1px solid transparent;
      box-sizing: border-box;
    }

    .btn-login:hover {
      background-color: #0062cc;
    }
  </style>

  <script>
    const ICON_BASE = "https://basicallydevyt.github.io/main/WebsiteIcons/";
    const ROLES_JSON_URL = "roles.json";
    const AUTH_REDIRECT_URL = "https://basicallydevyt.github.io/main/AccountService/?return=main/Dashboard";

    // Reads ONLY the global user_session cookie
    function getGlobalSessionCookie() {
      let ca = document.cookie.split(';');
      for(let i=0; i < ca.length; i++) {
        let c = ca[i].trim();
        if (c.indexOf("user_session=") == 0) {
          return JSON.parse(decodeURIComponent(c.substring("user_session=".length)));
        }
      }
      return null;
    }

    function getSessionCookieName() {
      const urlParams = new URLSearchParams(window.location.search);
      const onlyWith = urlParams.get('onlywith')?.toLowerCase();
      
      if (onlyWith === 'google') return 'google_session';
      if (onlyWith === 'discord') return 'discord_session';
      return 'user_session'; 
    }

    function deleteSharedCookie(name) {
      document.cookie = name + "=; path=/main/; expires=Thu, 01 Jan 1970 00:00:00 GMT";
    }

    // Erases the cookie safely by setting it to expire immediately
    function handleSignOut() {
      deleteSharedCookie(getSessionCookieName());
      window.location.reload();
    }

    window.addEventListener('DOMContentLoaded', async function() {
      const user = getGlobalSessionCookie();
      
      // If global cookie is completely missing, change layouts to show login button instead of profile
      if (!user) {
        document.getElementById('logged-in-view').style.display = 'none';
        document.getElementById('logged-out-view').style.display = 'block';
        document.getElementById('login-link').href = "https://basicallydevyt.github.io/main/AccountService/?return=main/Dashboard";
        return;
      }

      // Ensure the logged-in setup is visible
      document.getElementById('logged-in-view').style.display = 'flex';
      document.getElementById('logged-out-view').style.display = 'none';

      // Populate interface data
      document.getElementById('username').textContent = user.name;
      document.getElementById('display-avatar').src = user.avatar || 'https://www.gstatic.com/images/branding/product/2x/avatar_anonymous_64dp.png';

      const badgeContainer = document.getElementById('badge-icon-container');

      // Configurations containing explicit image icons for each role type
      const roleConfig = {
        "creator": { icon: "Creator.png" },
        "elder": { icon: "ElderModerator.webp" },
        "trusted": { icon: "LeaderboardModerator.webp" },
        "moderator": { icon: "Moderator.webp" },
        "normal": { icon: "Moderator.webp" },
        "trial_mod": { icon: "Moderator.webp" }, // Pointed to your valid moderator asset
        "featured": { icon: "Featured.png" }
      };

      try {
        const response = await fetch(ROLES_JSON_URL);
        if (!response.ok) throw new Error("Could not load privileges");
        const roles = await response.json();

        const platform = String(user.provider || '').toLowerCase().trim(); 
        let matchedRoles = []; 

        if (platform === 'discord') {
          const discordId = user.id;
          
          if (roles.creator && roles.creator.discord && roles.creator.discord.includes(discordId)) {
            matchedRoles.push("creator");
          }
          if (roles.moderators && roles.moderators.discord && roles.moderators.discord[discordId]) {
            matchedRoles.push(roles.moderators.discord[discordId]);
          }
          if (roles.featured && roles.featured.discord && roles.featured.discord.includes(discordId)) {
            matchedRoles.push("featured");
          }
        } 
        else if (platform === 'google' && user.email) {
          const rawUserEmail = String(user.email).toLowerCase().trim();
          
          // 1. Check Creator List
          const isCreator = roles.creator && roles.creator.google && roles.creator.google.some(encodedEmail => {
            try {
              return atob(encodedEmail).toLowerCase().trim() === rawUserEmail;
            } catch(e) { return false; }
          });
          if (isCreator) matchedRoles.push("creator");

          // 2. Check Moderator Objects
          if (roles.moderators && roles.moderators.google) {
            for (const encodedEmail in roles.moderators.google) {
              try {
                if (atob(encodedEmail).toLowerCase().trim() === rawUserEmail) {
                  matchedRoles.push(roles.moderators.google[encodedEmail]);
                  break;
                }
              } catch(e) {}
            }
          }

          // 3. Check Featured Lists
          if (roles.featured && roles.featured.google) {
            const isFeatured = roles.featured.google.some(encodedEmail => {
              try {
                return atob(encodedEmail).toLowerCase().trim() === rawUserEmail;
              } catch(e) { return false; }
            });
            if (isFeatured) matchedRoles.push("featured");
          }
        }

        // --- Render Multiple Image Badge Icons Side-By-Side ---
        badgeContainer.innerHTML = ""; // Wipe original layout placeholder text

        if (matchedRoles.length > 0) {
          matchedRoles.forEach(roleKey => {
            const cleanKey = String(roleKey).toLowerCase().trim();
            const config = roleConfig[cleanKey];

            if (config) {
              // Generate an explicit image element for every single matched role icon
              const img = document.createElement("img");
              img.className = "role-badge-icon";
              img.src = ICON_BASE + config.icon;
              img.alt = roleKey;
              badgeContainer.appendChild(img);
            }
          });
        } else {
          // Standard Member Text fallback if zero assigned roles exist
          const div = document.createElement("div");
          div.className = "fallback-label";
          div.innerText = "Member";
          badgeContainer.appendChild(div);
        }

      } catch (err) {
        console.error("Privilege lookup failed:", err);
        badgeContainer.innerHTML = "";
        const img = document.createElement("img");
        img.className = "role-badge-icon";
        img.src = ICON_BASE + "Error.png";
        img.alt = "Error";
        badgeContainer.appendChild(img);
      }
    });
  </script>
</head>
<body>

  <div class="profile-card">
    
    <div id="logged-in-view" style="display: flex; flex-direction: column; align-items: center; gap: 16px; width: 100%;">
      <div class="avatar-wrapper">
        <img id="display-avatar" class="user-avatar" src="" alt="Avatar">
      </div>
      
      <h2 id="username" class="user-name">Loading...</h2>
      
      <!-- Container row where all matching badge images inject next to each other -->
      <div id="badge-icon-container">
        <div class="fallback-label">Connecting...</div>
      </div>

      <div class="button-group">
        <a href="https://basicallydevyt.github.io/main/" class="btn btn-exit">Exit</a>
        <button onclick="handleSignOut()" class="btn btn-signout">Sign Out</button>
      </div>
    </div>

    <div id="logged-out-view" style="display: none; width: 100%; text-align: center;">
      <h2 class="user-name" style="margin-bottom: 20px;">Access Dashboard</h2>
      <a id="login-link" href="#" class="btn btn-login">Log In</a>
    </div>

  </div>

</body>
</html>
