<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <style>
    /* Sleek, Jet-Black Modern Aesthetic */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #09090b;
      color: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      box-sizing: border-box;
    }

    /* Minimalist Profile Card */
    .profile-card {
      background-color: #121214;
      border: 1px solid #27272a;
      border-radius: 16px;
      padding: 32px;
      width: 320px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
    }

    /* Profile Avatar Container */
    .avatar-wrapper {
      position: relative;
      display: inline-block;
    }

    .user-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 2px solid #27272a;
      object-fit: cover;
      background-color: #1c1c1e;
    }

    /* Absolute Center/Corner Layout for Badge (Uncropped) */
    .role-badge {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 32px;
      height: 32px;
      display: none;
      object-fit: contain;
      background: #121214;
      border-radius: 50%;
      border: 2px solid #27272a;
      padding: 2px;
    }

    /* Username & Role Text styling */
    .user-name {
      font-size: 1.5rem;
      font-weight: 700;
      color: #ffffff;
      margin: 0;
      letter-spacing: -0.5px;
      text-align: center;
    }

    .role-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #a1a1aa;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 0;
    }
  </style>

  <script>
    const ICON_BASE = "https://basicallydevyt.github.io/main/WebsiteIcons/";
    const ROLES_JSON_URL = "roles.json";
    const AUTH_REDIRECT_URL = "https://basicallydevyt.github.io/main/AccountService/?return=main/Dashboard";

    // Reads ONLY the global user_session cookie
    function getGlobalSessionCookie() {
      let ca = document.cookie.split(';');
      for(let i=0; i < ca.length; i++) {
        let c = ca[i].trim();
        if (c.indexOf("user_session=") == 0) {
          return JSON.parse(decodeURIComponent(c.substring("user_session=".length)));
        }
      }
      return null;
    }

    window.addEventListener('DOMContentLoaded', async function() {
      const user = getGlobalSessionCookie();
      
      // If global cookie is missing, kick back to login page
      if (!user) {
        window.location.href = AUTH_REDIRECT_URL;
        return;
      }

      // Populate basic info
      document.getElementById('username').textContent = user.name;
      document.getElementById('display-avatar').src = user.avatar || 'https://www.gstatic.com/images/branding/product/2x/avatar_anonymous_64dp.png';

      const badgeImg = document.getElementById('display-badge');
      const roleTxt = document.getElementById('role-display');

      try {
        const response = await fetch(ROLES_JSON_URL);
        if (!response.ok) throw new Error("Could not load privileges");
        const roles = await response.json();

        const platform = user.provider; 
        let userKey = null;

        if (platform === 'discord') {
          userKey = user.id;
          if (!userKey && user.avatar) {
            const discMatch = user.avatar.match(/\/avatars\/([0-9]+)\//);
            if (discMatch) userKey = discMatch[1];
          }
        } else if (platform === 'google') {
          if (user.email) {
            const rawUserEmail = user.email.toLowerCase().trim();
            
            // Decodes the Base64 strings from roles.json to find a match
            const isCreator = roles.creator && roles.creator.google && roles.creator.google.some(encodedEmail => {
              try {
                return atob(encodedEmail).toLowerCase().trim() === rawUserEmail;
              } catch(e) { return false; }
            });

            if (isCreator) {
              userKey = roles.creator.google[0]; 
            }
            
            if (!userKey && roles.moderators && roles.moderators.google) {
              for (const encodedEmail in roles.moderators.google) {
                try {
                  if (atob(encodedEmail).toLowerCase().trim() === rawUserEmail) {
                    userKey = encodedEmail;
                    break;
                  }
                } catch(e) {}
              }
            }

            if (!userKey && roles.featured && roles.featured.google) {
              const isFeatured = roles.featured.google.some(encodedEmail => {
                try {
                  return atob(encodedEmail).toLowerCase().trim() === rawUserEmail;
                } catch(e) { return false; }
              });
              if (isFeatured) {
                userKey = roles.featured.google.find(encodedEmail => atob(encodedEmail).toLowerCase().trim() === rawUserEmail);
              }
            }
          }
        }

        if (!userKey) throw new Error("Missing identification token");

        // --- Role Verification Checks ---
        
        // 1. Creator Tier
        if (roles.creator && roles.creator[platform] && roles.creator[platform].includes(userKey)) {
          badgeImg.src = ICON_BASE + "Creator.png";
          badgeImg.style.display = "block";
          roleTxt.textContent = "Creator";
          roleTxt.style.color = "#ff4500";
        } 
        // 2. Moderator Tiers
        else if (roles.moderators && roles.moderators[platform] && roles.moderators[platform][userKey]) {
          const modType = roles.moderators[platform][userKey].toLowerCase();
          
          if (modType === "elder") {
            badgeImg.src = ICON_BASE + "ElderModerator.webp";
            roleTxt.textContent = "Elder Moderator";
            roleTxt.style.color = "#ff2d55";
          } else if (modType === "trusted") {
            badgeImg.src = ICON_BASE + "LeaderboardModerator.webp";
            roleTxt.textContent = "Trusted Moderator";
            roleTxt.style.color = "#af52de";
          } else {
            badgeImg.src = ICON_BASE + "Moderator.webp";
            roleTxt.textContent = "Moderator";
            roleTxt.style.color = "#34c759";
          }
          badgeImg.style.display = "block";
        } 
        // 3. Featured Lists
        else if (roles.featured && roles.featured[platform] && roles.featured[platform].includes(userKey)) {
          badgeImg.src = ICON_BASE + "Featured.png";
          badgeImg.style.display = "block";
          roleTxt.textContent = "Featured User";
          roleTxt.style.color = "#ffcc00";
        } 
        // 4. Base Member Tier
        else {
          roleTxt.textContent = "Member";
          roleTxt.style.color = "#a1a1aa";
        }

      } catch (err) {
        console.error("Privilege lookup failed:", err);
        badgeImg.src = ICON_BASE + "Error.png"; 
        badgeImg.style.display = "block";
        roleTxt.textContent = "Error Loading Roles";
        roleTxt.style.color = "#ff453a";
      }
    });
  </script>
</head>
<body>

  <div class="profile-card">
    <div class="avatar-wrapper">
      <img id="display-avatar" class="user-avatar" src="" alt="Avatar">
      <img id="display-badge" class="role-badge" src="" alt="Badge">
    </div>
    
    <h2 id="username" class="user-name">Loading...</h2>
    <div id="role-display" class="role-label">Connecting...</div>
  </div>

</body>
</html>
