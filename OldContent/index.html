<!DOCTYPE HTML>
<html>
  <head>
    <meta charset="utf-8">
    <title>Old Content</title>
    <meta http-equiv="Content-Security-Policy" content="frame-ancestors 'none';">
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #1a1a1a;
        color: #ffffff;
        text-align: center;
        padding: 40px 20px;
        margin: 0;
        position: relative;
      }

      h1 {
        font-size: 2.5rem;
        margin-bottom: 10px;
        margin-top: 80px; /* Pushed down to clear space for the login system */
      }

      p {
        font-size: 1.1rem;
        color: #cccccc;
        line-height: 1.6;
      }

      .dev-warning {
        color: #ff4d4d;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-size: 0.9rem;
        margin-top: 20px;
        margin-bottom: 30px;
      }

      button {
        background-color: #ff0000;
        color: #ffffff;
        border: none;
        padding: 12px 28px;
        font-size: 1rem;
        font-weight: bold;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 0 0px rgba(255, 0, 0, 0);
        margin-bottom: 20px;
      }

      button:hover {
        background-color: #ff3333;
        transform: translateY(-2px);
        box-shadow: 0 0 15px #ff0000, 0 0 30px #ff0000;
      }

      .file-directory {
        max-width: 600px;
        margin: 40px auto;
        text-align: left;
        background-color: #262626;
        border: 1px solid #444444;
        border-radius: 8px;
        padding: 25px;
      }

      .category-title {
        color: #ff4d4d;
        font-size: 1.3rem;
        border-bottom: 1px solid #444444;
        padding-bottom: 5px;
        margin-top: 25px;
        margin-bottom: 10px;
        font-weight: bold;
        text-transform: uppercase;
      }
      .category-title:first-of-type {
        margin-top: 0;
      }

      .file-list {
        list-style: none;
        padding-left: 0;
        margin: 0 0 20px 0;
      }

      .file-item {
        padding: 6px 0;
        font-family: 'Courier New', Courier, monospace;
      }

      .file-link {
        color: #33a3ff;
        text-decoration: none;
      }
      .file-link:hover {
        text-decoration: underline;
      }

      .empty-msg {
        color: #666666;
        font-style: italic;
        font-size: 0.95rem;
      }

      /* --- TOP RIGHT CORNER AUTH HOOK LAYOUTS --- */
      .auth-corner-widget {
        position: absolute;
        top: 20px;
        right: 20px;
        z-index: 100;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 8px;
      }

      /* Blue Standard Login Button */
      .top-login-btn {
        background-color: #1a73e8;
        color: #ffffff;
        text-decoration: none;
        padding: 10px 20px;
        font-weight: bold;
        font-size: 0.95rem;
        border-radius: 4px;
        display: inline-block;
        transition: background-color 0.2s, transform 0.2s;
      }

      .top-login-btn:hover {
        background-color: #1557b0;
        transform: translateY(-1px);
      }

      /* Profile Layout Label (Icon Right, Name Left) */
      .user-profile-label {
        display: flex;
        align-items: center;
        gap: 12px;
        background: #252525;
        padding: 6px 14px 6px 18px;
        border-radius: 30px;
        border: 1px solid #333;
      }

      .user-profile-label .username {
        font-weight: bold;
        font-size: 0.95rem;
        color: #ffffff;
      }

      .user-profile-label .avatar-circle {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        object-fit: cover;
        background-color: #444;
      }

      /* Compact Sign Out Button Element underneath profile */
      .top-signout-btn {
        background-color: #d93025;
        color: white;
        border: none;
        border-radius: 4px;
        padding: 5px 12px;
        font-size: 0.8rem;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.2s;
      }

      .top-signout-btn:hover {
        background-color: #b3241c;
      }
    </style>
  </head>
  <body>

    <div id="auth-corner" class="auth-corner-widget"></div>

    <h1>Old content</h1>
    <p>
      This is where i store my Old files!
    </p>
    <p class="dev-warning">
       This is OLD Content from before, it may not be the original file.
    </p>
    <a href="https://basicallydevyt.github.io/main/"><button>Go back home</button></a>

    <div class="file-directory">
      <div id="directory-content">Loading files...</div>
    </div>

    <script>
      // --- Cookie Extraction & Management Engine ---
      function getSharedCookie(name) {
        let nameEQ = name + "=";
        let ca = document.cookie.split(';');
        for(let i=0; i < ca.length; i++) {
          let c = ca[i];
          while (c.charAt(0) == ' ') c = c.substring(1, c.length);
          if (c.indexOf(nameEQ) == 0) {
            try {
              return JSON.parse(decodeURIComponent(c.substring(nameEQ.length, c.length)));
            } catch(e) {
              return null;
            }
          }
        }
        return null;
      }

      function deleteSharedCookie(name) {
        document.cookie = name + "=; path=/main/; expires=Thu, 01 Jan 1970 00:00:00 GMT";
      }

      function handleWidgetSignOut() {
        deleteSharedCookie('user_session');
        window.location.reload();
      }

      // --- Runtime Auth Visual Evaluator ---
      function renderAuthWidget() {
        const activeSession = getSharedCookie('user_session');
        const container = document.getElementById('auth-corner');

        if (activeSession) {
          container.innerHTML = `
            <div class="user-profile-label">
              <span class="username">${activeSession.name}</span>
              <img class="avatar-circle" src="${activeSession.avatar}" alt="User Profile Image" style="border: 2px solid ${activeSession.provider === 'discord' ? '#5865F2' : '#4caf50'};">
            </div>
            <button class="top-signout-btn" onclick="handleWidgetSignOut()">Sign out</button>
          `;
        } else {
          container.innerHTML = `
            <a href="https://basicallydevyt.github.io/main/AccountService/?return=OldContent" class="top-login-btn">Sign in</a>
          `;
        }
      }

      // --- GitHub Content Directory Methods ---
      const USERNAME = 'basicallydevyt';
      const REPO = 'main';
      const FOLDER_PATH = 'OldContent'; 
      const CACHE_KEY = 'old_content_cache_v2';
      const ETAG_KEY = 'old_content_etag';

      async function fetchFiles() {
        const container = document.getElementById('directory-content');
        const url = `https://api.github.com/repos/${USERNAME}/${REPO}/contents/${FOLDER_PATH}`;

        const cachedData = localStorage.getItem(CACHE_KEY);
        const cachedEtag = localStorage.getItem(ETAG_KEY);

        const headers = {};
        if (cachedData && cachedEtag) {
          headers['If-None-Match'] = cachedEtag;
        }

        try {
          const response = await fetch(url, { headers });

          if (response.status === 304 && cachedData) {
            console.log("No changes detected on GitHub. Loading from cache.");
            processAndRenderFiles(JSON.parse(cachedData));
            return;
          }
          
          if (response.status === 403) {
            if (cachedData) {
              console.warn("API Rate limited. Displaying cached backup.");
              processAndRenderFiles(JSON.parse(cachedData));
              return;
            }
            throw new Error("GitHub API Rate Limit Exceeded.");
          }
          
          if (!response.ok) throw new Error("Failed to load repo files");
          
          const files = await response.json();
          const newEtag = response.headers.get('ETag');

          localStorage.setItem(CACHE_KEY, JSON.stringify(files));
          if (newEtag) {
            localStorage.setItem(ETAG_KEY, newEtag);
          }

          processAndRenderFiles(files);

        } catch (err) {
          container.innerHTML = `<p style="color:#ff4d4d;">Error loading files: ${err.message}</p>`;
        }
      }

      function processAndRenderFiles(files) {
        const container = document.getElementById('directory-content');
        const categories = {
          images: [],
          audio: [],
          videos: [],
          gifs: [],
          extra: []
        };

        const imgExt = ['png', 'jpg', 'jpeg', 'webp', 'bmp', 'ico'];
        const audExt = ['mp3', 'wav', 'ogg', 'm4a'];
        const vidExt = ['mp4', 'webm', 'mov', 'avi'];

        files.forEach(file => {
          if (file.type !== 'file' || file.name.toLowerCase() === 'index.html') return;

          const ext = file.name.split('.').pop().toLowerCase();

          if (ext === 'gif') {
            categories.gifs.push(file);
          } else if (imgExt.includes(ext)) {
            categories.images.push(file);
          } else if (audExt.includes(ext)) {
            categories.audio.push(file);
          } else if (vidExt.includes(ext)) {
            categories.videos.push(file);
          } else {
            categories.extra.push(file);
          }
        });

        let htmlOutput = '';
        htmlOutput += renderCategory('Images', categories.images);
        htmlOutput += renderCategory('Audio', categories.audio);
        htmlOutput += renderCategory('Videos', categories.videos);
        htmlOutput += renderCategory('Gif', categories.gifs);
        htmlOutput += renderCategory('Extra Files', categories.extra);

        container.innerHTML = htmlOutput;
      }

      function renderCategory(title, fileArray) {
        let sectionHtml = `<div class="category-title">${title}</div>`;
        if (fileArray.length === 0) {
          sectionHtml += `<p class="empty-msg">No files found in this category.</p>`;
          return sectionHtml;
        }

        sectionHtml += `<ul class="file-list">`;
        fileArray.forEach(file => {
          sectionHtml += `
            <li class="file-item">
              📄 <a class="file-link" href="${file.html_url}" target="_blank">${file.name}</a>
            </li>`;
        });
        sectionHtml += `</ul>`;
        return sectionHtml;
      }

      // Initializer runs on boot
      window.addEventListener('DOMContentLoaded', function() {
        renderAuthWidget();
        fetchFiles();
      });
    </script>
  </body>
</html>
