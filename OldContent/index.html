<!DOCTYPE HTML>
<html>
  <head>
    <meta charset="utf-8">
    <title>Old Content</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #1a1a1a;
        color: #ffffff;
        text-align: center;
        padding: 40px 20px;
        margin: 0;
      }

      h1 {
        font-size: 2.5rem;
        margin-bottom: 10px;
      }

      p {
        font-size: 1.1rem;
        color: #cccccc;
        line-height: 1.6;
      }

      .dev-warning {
        color: #ff4d4d;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-size: 0.9rem;
        margin-top: 20px;
        margin-bottom: 30px;
      }

      button {
        background-color: #ff0000;
        color: #ffffff;
        border: none;
        padding: 12px 28px;
        font-size: 1rem;
        font-weight: bold;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 0 0px rgba(255, 0, 0, 0);
        margin-bottom: 20px;
      }

      button:hover {
        background-color: #ff3333;
        transform: translateY(-2px);
        box-shadow: 0 0 15px #ff0000, 0 0 30px #ff0000;
      }

      .file-directory {
        max-width: 600px;
        margin: 40px auto;
        text-align: left;
        background-color: #262626;
        border: 1px solid #444444;
        border-radius: 8px;
        padding: 25px;
      }

      .category-title {
        color: #ff4d4d;
        font-size: 1.3rem;
        border-bottom: 1px solid #444444;
        padding-bottom: 5px;
        margin-top: 25px;
        margin-bottom: 10px;
        font-weight: bold;
        text-transform: uppercase;
      }
      .category-title:first-of-type {
        margin-top: 0;
      }

      .file-list {
        list-style: none;
        padding-left: 0;
        margin: 0 0 20px 0;
      }

      .file-item {
        padding: 6px 0;
        font-family: 'Courier New', Courier, monospace;
      }

      .file-link {
        color: #33a3ff;
        text-decoration: none;
      }
      .file-link:hover {
        text-decoration: underline;
      }

      .empty-msg {
        color: #666666;
        font-style: italic;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <h1>Old content</h1>
    <p>
      This is where i store my Old files!
    </p>
    <p class="dev-warning">
       This is OLD Content from before, it may not be the original file.
    </p>
    <a href="https://basicallydevyt.github.io/main/Channel"><button>Go to channel page</button></a>

    <div class="file-directory">
      <div id="directory-content">Loading files...</div>
    </div>

    <script>
      // Change these to match your repository targets
      const USERNAME = 'basicallydevyt';
      const REPO = 'main';
      const FOLDER_PATH = ''; // Leave blank for root folder directory layout

      async function fetchFiles() {
        const container = document.getElementById('directory-content');
        const url = `https://api.github.com/repos/${USERNAME}/${REPO}/contents/${FOLDER_PATH}`;

        try {
          const response = await fetch(url);
          if (!response.ok) throw new Error("Failed to load repo files");
          const files = await response.json();

          // Categorized sorting boxes
          const categories = {
            images: [],
            audio: [],
            videos: [],
            gifs: [],
            extra: []
          };

          // File extension filters
          const imgExt = ['png', 'jpg', 'jpeg', 'webp', 'bmp', 'ico'];
          const audExt = ['mp3', 'wav', 'ogg', 'm4a'];
          const vidExt = ['mp4', 'webm', 'mov', 'avi'];

          files.forEach(file => {
            // Ignore folder structures and index.html
            if (file.type !== 'file' || file.name.toLowerCase() === 'index.html') return;

            const ext = file.name.split('.').pop().toLowerCase();

            if (ext === 'gif') {
              categories.gifs.push(file);
            } else if (imgExt.includes(ext)) {
              categories.images.push(file);
            } else if (audExt.includes(ext)) {
              categories.audio.push(file);
            } else if (vidExt.includes(ext)) {
              categories.videos.push(file);
            } else {
              categories.extra.push(file);
            }
          });

          // Render groups strictly in your designated order
          let htmlOutput = '';

          htmlOutput += renderCategory('Images', categories.images);
          htmlOutput += renderCategory('Audio', categories.audio);
          htmlOutput += renderCategory('Videos', categories.videos);
          htmlOutput += renderCategory('Gif', categories.gifs);
          htmlOutput += renderCategory('Extra Files', categories.extra);

          container.innerHTML = htmlOutput;

        } catch (err) {
          container.innerHTML = `<p style="color:#ff4d4d;">Error loading files: ${err.message}</p>`;
        }
      }

      function renderCategory(title, fileArray) {
        let sectionHtml = `<div class="category-title">${title}</div>`;
        if (fileArray.length === 0) {
          sectionHtml += `<p class="empty-msg">No files found in this category.</p>`;
          return sectionHtml;
        }

        sectionHtml += `<ul class="file-list">`;
        fileArray.forEach(file => {
          sectionHtml += `
            <li class="file-item">
              📄 <a class="file-link" href="${file.html_url}" target="_blank">${file.name}</a>
            </li>`;
        });
        sectionHtml += `</ul>`;
        return sectionHtml;
      }

      fetchFiles();
    </script>
  </body>
</html>
