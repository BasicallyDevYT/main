<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in</title>
  <link rel="icon" href="https://raw.githubusercontent.com/BasicallyDevYT/main/refs/heads/main/AccountService/WebisteIcon.jpg">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #121212;
      color: #e3e3e3;
      text-align: center;
      padding-top: 50px;
    }
    .login-box {
      background: #1e1e1e;
      padding: 24px;
      border-radius: 8px;
      display: inline-block;
      box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.5);
      width: 320px;
      text-align: center;
    }
    img {
      width: 75px;
      display: block;
      margin: 0 auto 10px auto;
    }
    h2 {
      font-size: 24px;
      margin: 0 0 20px 0;
      color: #fff;
    }
    .button-container {
      display: flex;
      justify-content: center;
      margin-top: 15px;
    }
    #user-info {
      margin-top: 20px;
      padding: 10px;
      background: #2a2a2a;
      border-radius: 4px;
      display: none;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="login-box">
  <img src="https://raw.githubusercontent.com/BasicallyDevYT/main/refs/heads/main/AccountService/WebisteIcon.jpg" alt="Logo">
  <h2>Sign in</h2>

  <div id="g_id_onload"
       data-client_id="196116314911-l60piim5ck5utaabr33cr2o33q5l4ufp.apps.googleusercontent.com"
       data-context="signin"
       data-ux_mode="popup"
       data-callback="handleCredentialResponse"
       data-auto_prompt="false">
  </div>

  <div class="button-container">
    <div class="g_id_signin"
         data-type="standard"
         data-shape="rectangular"
         data-theme="filled_blue"
         data-text="signin_with"
         data-size="large"
         data-logo_alignment="left">
    </div>
  </div>

  <div id="user-info"></div>
</div>

<script>
  // This function executes automatically when a user logs in successfully
  function handleCredentialResponse(response) {
    const responsePayload = parseJwt(response.credential);

    // Display a welcome message using the verified data returned from Google
    const infoBox = document.getElementById("user-info");
    infoBox.style.display = "block";
    infoBox.innerHTML = `
      <p style="color: #4caf50; margin: 0 0 5px 0;"><strong>Login Successful!</strong></p>
      <p style="margin: 2px 0;">Name: ${responsePayload.name}</p>
      <p style="margin: 2px 0;">Email: ${responsePayload.email}</p>
    `;
  }

  // Helper function to safely read the login token details on the frontend
  function parseJwt(token) {
    var base64Url = token.split('.')[1];
    var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
    var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
    }).join(''));

    return JSON.parse(jsonPayload);
  }
</script>

</body>
</html>
