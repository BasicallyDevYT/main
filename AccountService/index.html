<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in</title>
  <link rel="icon" href="https://raw.githubusercontent.com/BasicallyDevYT/main/refs/heads/main/AccountService/WebisteIcon.jpg">
  
  <script>
    // --- Global Configuration Setup ---
    const DISCORD_CLIENT_ID = '1525897516854415450';
    const REDIRECT_URI = 'https://basicallydevyt.github.io/main/AccountService/'; 

    // --- Determine cookie name dynamically ---
    function getSessionCookieName() {
      const urlParams = new URLSearchParams(window.location.search);
      const onlyWith = urlParams.get('onlywith')?.toLowerCase();
      
      if (onlyWith === 'google') return 'google_session';
      if (onlyWith === 'discord') return 'discord_session';
      return 'user_session'; 
    }

    // --- Cookie Controls ---
    function setSharedCookie(name, value, days) {
      let expires = "";
      if (days) {
        let date = new Date();
        date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
        expires = "; expires=" + date.toUTCString();
      }
      document.cookie = name + "=" + encodeURIComponent(JSON.stringify(value)) + expires + "; path=/main/; SameSite=Lax";
    }

    function getSharedCookie(name) {
      let nameEQ = name + "=";
      let ca = document.cookie.split(';');
      for(let i=0; i < ca.length; i++) {
        let c = ca[i];
        while (c.charAt(0) == ' ') c = c.substring(1, c.length);
        if (c.indexOf(nameEQ) == 0) {
          try {
            return JSON.parse(decodeURIComponent(c.substring(nameEQ.length, c.length)));
          } catch(e) {
            return null;
          }
        }
      }
      return null;
    }

    function deleteSharedCookie(name) {
      document.cookie = name + "=; path=/main/; expires=Thu, 01 Jan 1970 00:00:00 GMT";
    }

    // --- Dynamic Navigation Redirector ---
    function handleNavigationRedirect() {
      const urlParams = new URLSearchParams(window.location.search);
      const returnTag = urlParams.get('return');
      
      if (returnTag) {
        window.location.href = "https://basicallydevyt.github.io/" + returnTag;
      }
    }

    // --- Render UI Layout State ---
    function displayUserProfile(user) {
      document.getElementById('auth-buttons').style.display = 'none';
      document.getElementById('login-header').style.display = 'none';
      
      const card = document.getElementById('user-card');
      card.style.display = 'block';
      
      document.getElementById('user-avatar').src = user.avatar || 'https://www.gstatic.com/images/branding/product/2x/avatar_anonymous_64dp.png';
      document.getElementById('user-name').textContent = user.name;
      document.getElementById('user-email').textContent = user.email;
      document.getElementById('user-avatar').style.borderColor = user.provider === 'discord' ? '#5865F2' : '#4caf50';
    }

    // --- Discord Popup Implementation & COOP Bypass ---
    function openDiscordPopup() {
      const url = `https://discord.com/api/oauth2/authorize?client_id=${DISCORD_CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify%20email`;
      const width = 500, height = 750;
      const left = (window.screen.width / 2) - (width / 2);
      const top = (window.screen.height / 2) - (height / 2);
      
      const popup = window.open(url, "DiscordAuthPopup", `width=${width},height=${height},top=${top},left=${left}`);
      
      const pollTimer = setInterval(function() {
        if (!popup || popup.closed) {
          clearInterval(pollTimer);
          return;
        }
        
        try {
          if (popup.location.origin === window.location.origin && popup.location.hash) {
            const fragment = new URLSearchParams(popup.location.hash.slice(1));
            const accessToken = fragment.get('access_token');
            
            if (accessToken) {
              clearInterval(pollTimer);
              popup.close(); 
              processDiscordToken(accessToken);
            }
          }
        } catch (e) { }
      }, 500);
    }

    // --- Fetch and Process Profile Data ---
    function processDiscordToken(accessToken) {
      fetch('https://discord.com/api/users/@me', {
        headers: { Authorization: `Bearer ${accessToken}` }
      })
      .then(res => res.json())
      .then(user => {
        let avatarUrl = 'https://assets-global.website-files.com/6257adef93867e50d84d30e2/636e0a6a49cf127bf92de1e2_icon_clyde_blurple_RGB.png';
        if (user.avatar) {
          avatarUrl = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
        }

        const userData = {
          name: user.username,
          email: user.email || 'No verified email',
          avatar: avatarUrl,
          provider: 'discord'
        };

        setSharedCookie(getSessionCookieName(), userData, 7);
        displayUserProfile(userData);
        handleNavigationRedirect(); 
      })
      .catch(err => console.error("Discord profile extraction failed:", err));
    }

    // --- Google Success Handler ---
    window.handleCredentialResponse = function(response) {
      const responsePayload = parseJwt(response.credential);
      const userData = {
        name: responsePayload.name,
        email: responsePayload.email,
        avatar: responsePayload.picture,
        provider: 'google'
      };

      setSharedCookie(getSessionCookieName(), userData, 7);
      displayUserProfile(userData);
      handleNavigationRedirect(); 
    };

    // --- Helper Token Parser ---
    function parseJwt(token) {
      var base64Url = token.split('.')[1];
      var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
          return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
      }).join(''));
      return JSON.parse(jsonPayload);
    }

    function signOut() {
      deleteSharedCookie(getSessionCookieName());
      window.location.reload();
    }

    // --- App Initializer ---
// Listener 1: Handles immediate Sign-Out requests cleanly with NO casing bugs
    window.addEventListener('DOMContentLoaded', function() {
      const urlParams = new URLSearchParams(window.location.search);
      const signOut = urlParams.get('signout');
      
      if (signOut) {
        deleteSharedCookie(getSessionCookieName());
        // Force the browser straight to the clean login page with your target return path preserved in perfect casing
        window.location.href = "https://basicallydevyt.github.io/main/" + signOut;
      }
    });

    // Listener 2: Handles normal Login / Dynamic UI filtering 
    window.addEventListener('DOMContentLoaded', function() {
      const urlParams = new URLSearchParams(window.location.search);
      const onlyWith = urlParams.get('onlywith')?.toLowerCase();
      
      const googleWrapper = document.getElementById('google-btn-wrapper');
      const discordBtn = document.getElementById('discord-auth-btn');

      if (onlyWith === 'google') {
        if (discordBtn) discordBtn.style.display = 'none';
      } else if (onlyWith === 'discord') {
        if (googleWrapper) googleWrapper.style.display = 'none';
      }

      // Read session cookie safely without interfering with the sign-out loop
      if (!urlParams.has('signout')) {
        const activeSession = getSharedCookie(getSessionCookieName());
        if (activeSession) {
          displayUserProfile(activeSession);
          handleNavigationRedirect(); 
        }
      }
    });
  </script>

  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #121212;
      color: #e3e3e3;
      text-align: center;
      padding-top: 50px;
    }
    .login-box {
      background: #1e1e1e;
      padding: 24px;
      border-radius: 8px;
      display: inline-block;
      box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.5);
      width: 320px;
      text-align: center;
    }
    img.logo {
      width: 75px;
      display: block;
      margin: 0 auto 10px auto;
    }
    h2 {
      font-size: 24px;
      margin: 0 0 20px 0;
      color: #fff;
    }
    .button-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      margin-top: 15px;
    }
    .discord-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 200px;
      height: 40px;
      background-color: #5865F2;
      color: white;
      text-decoration: none;
      font-weight: bold;
      font-size: 14px;
      border-radius: 4px;
      font-family: Roboto, Arial, sans-serif;
      transition: background-color 0.2s;
      box-sizing: border-box;
      cursor: pointer;
      border: none;
    }
    .discord-btn:hover {
      background-color: #4752C4;
    }
    .discord-icon {
      width: 20px;
      height: 20px;
      margin-right: 10px;
      fill: white;
      flex-shrink: 0;
    }
    #user-card {
      margin-top: 20px;
      padding: 16px;
      background: #2a2a2a;
      border-radius: 8px;
      display: none;
      text-align: center;
    }
    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      margin-bottom: 10px;
      border: 2px solid #4285f4;
    }
    .signout-btn {
      margin-top: 15px;
      padding: 8px 16px;
      background-color: #d93025;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }
    .signout-btn:hover {
      background-color: #b3241c;
    }
  </style>
</head>
<body>

<div class="login-box">
  <img class="logo" src="https://raw.githubusercontent.com/BasicallyDevYT/main/refs/heads/main/AccountService/WebisteIcon.jpg" alt="Logo">
  <h2 id="login-header">Sign in</h2>

  <div id="auth-buttons" class="button-container">
    <div id="google-btn-wrapper">
      <div class="g_id_signin"
           data-type="standard"
           data-shape="rectangular"
           data-theme="filled_blue"
           data-text="signin_with"
           data-size="large"
           data-logo_alignment="left">
      </div>
    </div>

    <button id="discord-auth-btn" class="discord-btn" onclick="openDiscordPopup()">
      <svg class="discord-icon" viewBox="0 0 127.14 96.36" xmlns="http://www.w3.org/2000/svg"><path d="M107.7,8.07A105.15,105.15,0,0,0,77.26,0a77.19,77.19,0,0,0-3.3,6.83A96.67,96.67,0,0,0,53.18,6.83,77.19,77.19,0,0,0,49.88,0,105.15,105.15,0,0,0,19.44,8.07C3.66,31.58-1.86,54.65,1,77.53A105.73,105.73,0,0,0,32,96.36a74.37,74.37,0,0,0,6.72-11,68.6,68.6,0,0,1-10.64-5.12c.91-.66,1.8-1.34,2.65-2a75.58,75.58,0,0,0,72.76,0c.85.69,1.74,1.37,2.65,2a68.42,68.42,0,0,1-10.64,5.12,74.74,74.74,0,0,0,6.72,11,105.73,105.73,0,0,0,31.07-18.83C129.33,49.52,123.63,26.74,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53S36.18,40.36,42.45,40.36,53.83,46,53.83,53,48.72,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.24,60,73.24,53S78.41,40.36,84.69,40.36,96.07,46,96.07,53,91,65.69,84.69,65.69Z"/></svg>
      Sign in with Discord
    </button>
  </div>

  <div id="g_id_onload"
       data-client_id="196116314911-l60piim5ck5utaabr33cr2o33q5l4ufp.apps.googleusercontent.com"
       data-context="signin"
       data-ux_mode="popup"
       data-callback="handleCredentialResponse"
       data-auto_prompt="false">
  </div>

  <div id="user-card">
    <img id="user-avatar" class="avatar" src="" alt="Avatar">
    <h3 id="user-name" style="margin: 5px 0; color: #fff;"></h3>
    <p id="user-email" style="margin: 2px 0; color: #aaa; font-size: 13px;"></p>
    <button class="signout-btn" onclick="signOut()">Sign out</button>
  </div>
</div>

</body>
</html>
