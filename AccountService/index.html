<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in</title>
  <link rel="icon" href="https://raw.githubusercontent.com/BasicallyDevYT/main/refs/heads/main/AccountService/WebisteIcon.jpg">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #121212;
      color: #e3e3e3;
      text-align: center;
      padding-top: 50px;
    }
    .login-box {
      background: #1e1e1e;
      padding: 24px;
      border-radius: 8px;
      display: inline-block;
      box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.5);
      width: 320px;
      text-align: center;
    }
    img.logo {
      width: 75px;
      display: block;
      margin: 0 auto 10px auto;
    }
    h2 {
      font-size: 24px;
      margin: 0 0 20px 0;
      color: #fff;
    }
    .button-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      margin-top: 15px;
    }
    /* Discord Button Layout Fixes */
    .discord-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 200px;
      height: 40px;
      background-color: #5865F2;
      color: white;
      text-decoration: none;
      font-weight: bold;
      font-size: 14px;
      border-radius: 4px;
      font-family: Roboto, Arial, sans-serif;
      transition: background-color 0.2s;
      box-sizing: border-box;
    }
    .discord-btn:hover {
      background-color: #4752C4;
    }
    .discord-icon {
      width: 20px;
      height: 20px;
      margin-right: 10px;
      fill: white;
      flex-shrink: 0;
    }
    #user-info {
      margin-top: 20px;
      padding: 10px;
      background: #2a2a2a;
      border-radius: 4px;
      display: none;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="login-box">
  <img class="logo" src="https://raw.githubusercontent.com/BasicallyDevYT/main/refs/heads/main/AccountService/WebisteIcon.jpg" alt="Logo">
  <h2>Sign in</h2>

  <div id="g_id_onload"
       data-client_id="196116314911-l60piim5ck5utaabr33cr2o33q5l4ufp.apps.googleusercontent.com"
       data-context="signin"
       data-ux_mode="popup"
       data-callback="handleCredentialResponse"
       data-auto_prompt="false">
  </div>

  <div class="button-container">
    <div class="g_id_signin"
         data-type="standard"
         data-shape="rectangular"
         data-theme="filled_blue"
         data-text="signin_with"
         data-size="large"
         data-logo_alignment="left">
    </div>

    <a id="discord-login-link" class="discord-btn" href="#">
      <svg class="discord-icon" viewBox="0 0 127.14 96.36" xmlns="http://www.w3.org/2000/svg"><path d="M107.7,8.07A105.15,105.15,0,0,0,77.26,0a77.19,77.19,0,0,0-3.3,6.83A96.67,96.67,0,0,0,53.18,6.83,77.19,77.19,0,0,0,49.88,0,105.15,105.15,0,0,0,19.44,8.07C3.66,31.58-1.86,54.65,1,77.53A105.73,105.73,0,0,0,32,96.36a74.37,74.37,0,0,0,6.72-11,68.6,68.6,0,0,1-10.64-5.12c.91-.66,1.8-1.34,2.65-2a75.58,75.58,0,0,0,72.76,0c.85.69,1.74,1.37,2.65,2a68.42,68.42,0,0,1-10.64,5.12,74.74,74.74,0,0,0,6.72,11,105.73,105.73,0,0,0,31.07-18.83C129.33,49.52,123.63,26.74,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53S36.18,40.36,42.45,40.36,53.83,46,53.83,53,48.72,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.24,60,73.24,53S78.41,40.36,84.69,40.36,96.07,46,96.07,53,91,65.69,84.69,65.69Z"/></svg>
      Sign in with Discord
    </a>
  </div>

  <div id="user-info"></div>
</div>

<script>
  // --- Discord Configuration ---
  const DISCORD_CLIENT_ID = '1525897516854415450';
  
  // Explicitly hardcode your GitHub Pages folder URL right here:
  const REDIRECT_URI = 'https://basicallydevyt.github.io/main/AccountService/'; 
  
  // Build the URL
  document.getElementById('discord-login-link').href = 
    `https://discord.com/api/oauth2/authorize?client_id=${DISCORD_CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify%20email`;

  // --- Handle Returning Discord Users ---
  window.onload = function() {
    const fragment = new URLSearchParams(window.location.hash.slice(1));
    const accessToken = fragment.get('access_token');

    if (accessToken) {
      window.history.replaceState({}, document.title, window.location.pathname);

      fetch('https://discord.com/api/users/@me', {
        headers: { Authorization: `Bearer ${accessToken}` }
      })
      .then(res => res.json())
      .then(user => {
        const infoBox = document.getElementById("user-info");
        infoBox.style.display = "block";
        infoBox.innerHTML = `
          <p style="color: #5865F2; margin: 0 0 5px 0;"><strong>Discord Login Successful!</strong></p>
          <p style="margin: 2px 0;">Username: ${user.username}</p>
          <p style="margin: 2px 0;">Email: ${user.email || 'No email verified'}</p>
        `;
      })
      .catch(err => console.error("Discord load failed:", err));
    }
  };

  // --- Google Success Handler ---
  function handleCredentialResponse(response) {
    const responsePayload = parseJwt(response.credential);
    const infoBox = document.getElementById("user-info");
    infoBox.style.display = "block";
    infoBox.innerHTML = `
      <p style="color: #4caf50; margin: 0 0 5px 0;"><strong>Google Login Successful!</strong></p>
      <p style="margin: 2px 0;">Name: ${responsePayload.name}</p>
      <p style="margin: 2px 0;">Email: ${responsePayload.email}</p>
    `;
  }

  function parseJwt(token) {
    var base64Url = token.split('.')[1];
    var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
    var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
    }).join(''));
    return JSON.parse(jsonPayload);
  }
</script>

</body>
</html>
