<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - Boogle</title>
  <link rel="icon" href="https://ssl.gstatic.com/accounts/ui/favicon.ico">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f2f2f2;
      text-align: center;
      padding-top: 50px;
    }
    .create-account-box {
      background: white;
      padding: 20px;
      border-radius: 8px;
      display: inline-block;
      box-shadow: 0px 0px 10px 0px gray;
      width: 320px;
      text-align: left;
    }
    input[type="text"], input[type="email"], input[type="password"], input[type="date"] {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 4px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }
    input[type="submit"] {
      width: 100%;
      padding: 10px;
      background-color: #4285f4;
      border: none;
      border-radius: 4px;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    input[type="submit"]:hover {
      background-color: #357ae8;
    }
    img {
      width: 75px;
      margin-bottom: 20px;
    }
    h2 {
      font-size: 24px;
      margin-bottom: 20px;
      color: #333;
    }
    .footer {
      margin-top: 20px;
      font-size: 14px;
      color: #555;
    }
    .footer a {
      text-decoration: none;
      color: #4285f4;
    }
    .footer a:hover {
      text-decoration: underline;
    }
    .error-message {
      color: red;
      font-size: 12px;
      margin-top: -10px;
    }
  </style>
</head>
<body>

<div class="create-account-box">
  <img src="https://static.wikia.nocookie.net/googlefanonpedia/images/9/9c/Festisite_google_%286%29.png/revision/latest?cb=20170223193600" alt="Boogle Logo">
  <h2>Create your Boogle Account</h2>
  <form id="create-account-form" method="POST">
    <input type="text" id="full-name" name="full-name" placeholder="Full Name" required><br>
    <div id="name-error" class="error-message"></div>

    <input type="email" id="email" name="email" placeholder="Email Address (e.g., name@bmail.com)" required><br>
    <div id="email-error" class="error-message"></div>

    <input type="password" id="password" name="password" placeholder="Create a Password" required><br>
    <div id="password-error" class="error-message"></div>

    <input type="date" id="dob" name="dob" placeholder="Date of Birth" required><br>
    <div id="dob-error" class="error-message"></div>

    <input type="submit" value="Create Account">
  </form>
  <div class="footer">
    <p>By creating an account, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</p>
    <p>Already have an account? <a href="file:///home/chronos/u-281700f3d5537e022f8c99b672c661ec011e82a3/MyFiles/Downloads/.start/.login.html">Sign in</a></p>
  </div>
</div>

<script>
  document.getElementById('create-account-form').addEventListener('submit', function(e) {
    e.preventDefault(); // Prevent form submission

    var name = document.getElementById('full-name').value;
    var email = document.getElementById('email').value;
    var password = document.getElementById('password').value;
    var dob = document.getElementById('dob').value;

    var nameError = document.getElementById('name-error');
    var emailError = document.getElementById('email-error');
    var passwordError = document.getElementById('password-error');
    var dobError = document.getElementById('dob-error');

    // Clear previous error messages
    nameError.textContent = '';
    emailError.textContent = '';
    passwordError.textContent = '';
    dobError.textContent = '';

    // Basic validation checks
    if (!name) {
      nameError.textContent = 'Please fill out this field';
    }
    if (!email) {
      emailError.textContent = 'Please fill out this field';
    } else if (!email.endsWith('@bmail.com')) {
      emailError.textContent = 'Email must end with @bmail.com';
    }
    if (!password) {
      passwordError.textContent = 'Please create a password';
    }
    if (!dob) {
      dobError.textContent = 'Please select a date of birth';
    }

    // If no errors, simulate account creation (no actual backend action)
    if (name && email && password && dob && email.endsWith('@bmail.com')) {
      alert('Your account has been successfully created! A confirmation email has been sent to ' + email + '.');
    }
  });
</script>

</body>
</html>
