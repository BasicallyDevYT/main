<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Famidash</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        #game {
            width: 100%;
            height: 100%;
        }
        /* Strip heavy engine CSS filters to save mobile GPU cycles */
        canvas {
            image-rendering: pixelated !important;
            image-rendering: crisp-edges !important;
            transform: translateZ(0); /* Forces iOS Hardware Acceleration */
        }
    </style>
</head>
<body>

    <div id="game"></div>

    <script type="text/javascript">
        // --- COOKIE ENGINE FUNCTIONS ---
        function setGameCookie(name, value) {
            const date = new Date();
            date.setTime(date.getTime() + (365 * 24 * 60 * 60 * 1000));
            document.cookie = name + "=" + encodeURIComponent(value) + "; expires=" + date.toUTCString() + "; path=/; SameSite=Strict";
        }

        function getGameCookie(name) {
            const matches = document.cookie.match(new RegExp("(?:^|; )" + name.replace(/([\.$?*|{}\(\)\[\]\\\/\+^])/g, '\\$1') + "=([^;]*)"));
            return matches ? decodeURIComponent(matches[1]) : null;
        }

        // --- CORE EMULATOR SETUP ---
        EJS_player = '#game';
        EJS_core = 'nes';
        EJS_gameUrl = 'https://raw.githubusercontent.com/BasicallyDevYT/main/master/Famidash/Famidash.nes';
        
        EJS_gameName = 'Famidash'; 
        EJS_gameID = 99124;        
        EJS_startOnLoaded = true;
        
        // --- PERFORMANCE STRIP ENGINE ---
        EJS_threads = false;          // Safe single-core fallback execution
        EJS_mouseLens = false;        // Disables heavy visual mouse zoom shaders
        EJS_bilinearFilter = false;   // <-- FIXED TYPO HERE (Shuts off smoothing filters)
        EJS_scale = 1;                // Keeps rendering bounds native to prevent GPU scaling lag

        // --- BINARY PROGRESS AUTO-LOADER LAYER ---
        const GAME_KEY = "EJS_AUTOSAVE_Famidash";
        const savedState = localStorage.getItem(GAME_KEY);

        if (savedState) {
            try {
                const binaryString = atob(savedState);
                const len = binaryString.length;
                const bytes = new Uint8Array(len);
                for (let i = 0; i < len; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }
                
                const stateFile = new File([bytes], "autosave.state");
                EJS_loadStateURL = URL.createObjectURL(stateFile);
                console.log("Auto-save package prepared successfully.");
            } catch (e) {
                console.error("Failed to decode save state on boot:", e);
            }
        }

        // --- HARDWARE ENGINE CONTROL KEYBINDS ---
        const defaultLayout = { 
            0: { 
                0: { 'value': 'z', 'value2': 'BUTTON_2' },          
                2: { 'value': 'shift', 'value2': 'SELECT' },        
                3: { 'value': 'enter', 'value2': 'START' },         
                4: { 'value': 'up arrow', 'value2': 'DPAD_UP' },    
                5: { 'value': 'down arrow', 'value2': 'DPAD_DOWN' },
                6: { 'value': 'left arrow', 'value2': 'DPAD_LEFT' },
                7: { 'value': 'right arrow', 'value2': 'DPAD_RIGHT'},
                8: { 'value': 'space', 'value2': 'BUTTON_1' }       
            },
            1: {},
            2: {},
            3: {}
        };

        const savedConfig = getGameCookie('famidash_config_data');
        EJS_defaultControls = savedConfig ? JSON.parse(savedConfig) : defaultLayout;

        EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';

        EJS_onSaveConfiguration = function(config) {
            if (config) {
                setGameCookie('famidash_config_data', JSON.stringify(config));
            }
        };

        // --- LIGHTWEIGHT ASYNC AUTO-SAVE ENGINE ---
        EJS_onGameStart = function() {
            const SAVE_INTERVAL = 20000; // Buffered to 20s to entirely eliminate performance hiccups
            
            setInterval(() => {
                try {
                    if (window.__EJS_emulator && window.__EJS_emulator.gameManager) {
                        const stateData = window.__EJS_emulator.gameManager.getState();
                        
                        if (stateData && stateData.length > 0) {
                            const blob = new Blob([stateData], {type: 'application/octet-stream'});
                            const reader = new FileReader();
                            
                            reader.onloadend = function() {
                                const base64State = reader.result.split(',')[1];
                                localStorage.setItem(GAME_KEY, base64State);
                            };
                            reader.readAsDataURL(blob);
                        }
                    }
                } catch (error) {
                    console.error("Auto-save runtime error:", error);
                }
            }, SAVE_INTERVAL);
        };
    </script>

    <script type="text/javascript" src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

    <script type="text/javascript">
        // --- UNIVERSAL HYBRID INPUT ENGINE ---
        window.addEventListener('DOMContentLoaded', () => {
            const gameContainer = document.getElementById('game');
            gameContainer.addEventListener('contextmenu', (e) => e.preventDefault());

            // Mobile Tap Layer
            gameContainer.addEventListener('touchstart', (e) => {
                if (typeof __EJS_emulator === 'undefined') return;
                if (e.target.closest('.button') || e.target.closest('#menu') || e.target.closest('.ejs-menu')) return;
                
                e.preventDefault();
                __EJS_emulator.gamepad_set_button(0, 8, 1); 
            }, { passive: false });

            gameContainer.addEventListener('touchend', (e) => {
                if (typeof __EJS_emulator === 'undefined') return;
                if (e.target.closest('.button') || e.target.closest('#menu') || e.target.closest('.ejs-menu')) return;
                
                e.preventDefault();
                __EJS_emulator.gamepad_set_button(0, 8, 0);
            }, { passive: false });

            // Desktop Mouse Layer
            gameContainer.addEventListener('mousedown', (e) => {
                if (typeof __EJS_emulator === 'undefined') return;
                if (e.button === 0) __EJS_emulator.gamepad_set_button(0, 8, 1);      
                else if (e.button === 2) __EJS_emulator.gamepad_set_button(0, 0, 1); 
            });

            gameContainer.addEventListener('mouseup', (e) => {
                if (typeof __EJS_emulator === 'undefined') return;
                if (e.button === 0) __EJS_emulator.gamepad_set_button(0, 8, 0);
                else if (e.button === 2) __EJS_emulator.gamepad_set_button(0, 0, 0);
            });
        });
    </script>

</body>
</html>
