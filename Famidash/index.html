<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Famidash - NES</title>
    <style>
        /* Forces the game window to lock flawlessly to 100% of the screen */
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            overflow: hidden;
        }
        #game {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="game"></div>

    <script type="text/javascript">
        EJS_player = '#game'; 
        EJS_core = 'nes';
        
        // This targets the exact raw data of your Famidash game file
        EJS_gameUrl = 'https://raw.githubusercontent.com/BasicallyDevYT/main/main/Famidash/Famidash.nes'; 
        
        // Audio & Startup configurations
        EJS_startOnLoaded = true; 
        EJS_Volume = 1.0;         
        
        // Highly stable CDN for core files to bypass strict security barriers
        EJS_pathtodata = 'https://rawcdn.githack.com/EmulatorJS/EmulatorJS/main/data/';
    </script>

    <script type="text/javascript" src="https://rawcdn.githack.com/EmulatorJS/EmulatorJS/main/data/loader.js"></script>

</body>
</html>
