<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Famidash</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        #game {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="game"></div>

    <script type="text/javascript">
        // --- COOKIE ENGINE FUNCTIONS ---
        function setGameCookie(name, value) {
            const date = new Date();
            date.setTime(date.getTime() + (365 * 24 * 60 * 60 * 1000));
            document.cookie = name + "=" + encodeURIComponent(value) + "; expires=" + date.toUTCString() + "; path=/; SameSite=Strict";
        }

        function getGameCookie(name) {
            const matches = document.cookie.match(new RegExp("(?:^|; )" + name.replace(/([\.$?*|{}\(\)\[\]\\\/\+^])/g, '\\$1') + "=([^;]*)"));
            return matches ? decodeURIComponent(matches[1]) : null;
        }

        // --- CORE EMULATOR SETUP ---
        EJS_player = '#game';
        EJS_core = 'nes';
        EJS_gameUrl = 'https://basicallydevyt.github.io/main/Famidash/Famidash.nes'; 
        
        EJS_gameName = 'Famidash'; 
        EJS_gameID = 99124;        
        EJS_startOnLoaded = true;
        EJS_Volume = 1.0;        

        // Performance Flags
        EJS_threads = true;       // Unlocks multi-core threading loops if server headers are live
        EJS_browserMode = 1;     // Optimizes UI canvas scaling for mobile and web frames

        // --- BINARY PROGRESS AUTO-LOADER LAYER ---
        const GAME_KEY = "EJS_AUTOSAVE_Famidash";
        const savedState = localStorage.getItem(GAME_KEY);

        if (savedState) {
            try {
                const binaryString = atob(savedState);
                const len = binaryString.length;
                const bytes = new Uint8Array(len);
                for (let i = 0; i < len; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }
                
                const stateFile = new File([bytes], "autosave.state");
                EJS_loadStateURL = URL.createObjectURL(stateFile);
                console.log("Auto-save package prepared successfully.");
            } catch (e) {
                console.error("Failed to decode save state on boot:", e);
            }
        }

        // --- HARDWARE ENGINE CONTROL KEYBINDS (Desktop Keyboard Layout) ---
        const defaultLayout = { 
            0: { 
                0: { 'value': 'z', 'value2': 'BUTTON_2' },          // Index 0: NES B -> Z Key
                2: { 'value': 'shift', 'value2': 'SELECT' },        // Index 2: Select -> Shift
                3: { 'value': 'enter', 'value2': 'START' },         // Index 3: Start -> Enter
                4: { 'value': 'up arrow', 'value2': 'DPAD_UP' },    // Index 4: D-Pad Up
                5: { 'value': 'down arrow', 'value2': 'DPAD_DOWN' },// Index 5: D-Pad Down
                6: { 'value': 'left arrow', 'value2': 'DPAD_LEFT' },// Index 6: D-Pad Left
                7: { 'value': 'right arrow', 'value2': 'DPAD_RIGHT'},// Index 7: D-Pad Right
                8: { 'value': 'space', 'value2': 'BUTTON_1' }       // Index 8: NES A -> Spacebar
            },
            1: {},
            2: {},
            3: {}
        };

        // --- COOKIE CONFIGURATION LOADER ---
        const savedConfig = getGameCookie('famidash_config_data');
        if (savedConfig) {
            try {
                EJS_defaultControls = JSON.parse(savedConfig);
            } catch(e) {
                EJS_defaultControls = defaultLayout;
            }
        } else {
            EJS_defaultControls = defaultLayout;
        }

        EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';

        EJS_onSaveConfiguration = function(config) {
            if (config) {
                setGameCookie('famidash_config_data', JSON.stringify(config));
            }
        };

        // --- NON-BLOCKING ASYNC BACKGROUND AUTO-SAVE ENGINE ---
        EJS_onGameStart = function() {
            const SAVE_INTERVAL = 15000; // 15 seconds to minimize frame drops on weaker CPUs
            
            setInterval(() => {
                try {
                    if (window.__EJS_emulator && window.__EJS_emulator.gameManager) {
                        const stateData = window.__EJS_emulator.gameManager.getState();
                        
                        if (stateData && stateData.length > 0) {
                            // Uses async FileReader blob mapping to prevent garbage collection spikes
                            const blob = new Blob([stateData], {type: 'application/octet-stream'});
                            const reader = new FileReader();
                            
                            reader.onloadend = function() {
                                const base64State = reader.result.split(',')[1];
                                localStorage.setItem(GAME_KEY, base64State);
                                
                                if (window.__EJS_emulator.displayMessage) {
                                    window.__EJS_emulator.displayMessage({text: "Progress Auto-Saved!", duration: 1200});
                                }
                            };
                            reader.readAsDataURL(blob);
                        }
                    }
                } catch (error) {
                    console.error("Auto-save runtime error:", error);
                }
            }, SAVE_INTERVAL);
        };
    </script>

    <script type="text/javascript" src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

    <script type="text/javascript">
        // --- UNIVERSAL HYBRID INPUT ENGINE ---
        window.addEventListener('DOMContentLoaded', () => {
            const gameContainer = document.getElementById('game');
            gameContainer.addEventListener('contextmenu', (e) => e.preventDefault());

            // 1. Mobile Tap Engine (Overrides default touch lag to tap immediately)
            gameContainer.addEventListener('touchstart', (e) => {
                if (typeof __EJS_emulator === 'undefined') return;
                // If the user taps a built-in menu button, allow standard browser behavior
                if (e.target.closest('.button') || e.target.closest('#menu')) return;
                
                e.preventDefault();
                __EJS_emulator.gamepad_set_button(0, 8, 1); // Tap screen -> Map to NES A
            }, { passive: false });

            gameContainer.addEventListener('touchend', (e) => {
                if (typeof __EJS_emulator === 'undefined') return;
                if (e.target.closest('.button') || e.target.closest('#menu')) return;
                
                e.preventDefault();
                __EJS_emulator.gamepad_set_button(0, 8, 0);
            }, { passive: false });

            // 2. Desktop Mouse Click Engine (Preserves Left/Right Click layout)
            gameContainer.addEventListener('mousedown', (e) => {
                if (typeof __EJS_emulator === 'undefined') return;
                if (e.button === 0) __EJS_emulator.gamepad_set_button(0, 8, 1);      // Left Click -> NES A
                else if (e.button === 2) __EJS_emulator.gamepad_set_button(0, 0, 1); // Right Click -> NES B
            });

            gameContainer.addEventListener('mouseup', (e) => {
                if (typeof __EJS_emulator === 'undefined') return;
                if (e.button === 0) __EJS_emulator.gamepad_set_button(0, 8, 0);
                else if (e.button === 2) __EJS_emulator.gamepad_set_button(0, 0, 0);
            });
        });
    </script>

</body>
</html>
