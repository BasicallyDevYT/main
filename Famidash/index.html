<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Famidash</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        canvas {
            width: 100vmin;
            height: 100vmin;
            max-width: 100vw;
            max-height: 100vh;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
    </style>
</head>
<body>

    <canvas id="emulator" width="256" height="240"></canvas>

    <!-- Hyper-optimized raw WASM NES core -->
    <script src="https://binjgb.github.io/binjnes/binjnes.js"></script>

    <script>
        const ROM_URL = 'https://basicallydevyt.github.io/main/Famidash/Famidash.nes';
        const SAVE_KEY = 'EJS_AUTOSAVE_Famidash';
        const canvas = document.getElementById('emulator');
        let emulator = null;
        let audioContext = null;

        // Initialize Audio Context on first user interaction (iOS Requirement)
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }

        // --- HARDWARE RUNTIME CORE ---
        async function startEmulator() {
            try {
                const response = await fetch(ROM_URL);
                const romBuffer = await response.arrayBuffer();
                const romUint8 = new Uint8Array(romBuffer);

                // Create clean instance directly on canvas
                emulator = new Binjnes(canvas, {
                    audioContext: audioContext,
                    onSave: (state) => {
                        // High-speed base64 encoding without blocking main execution thread
                        const blob = new Blob([state], {type: 'application/octet-stream'});
                        const reader = new FileReader();
                        reader.onloadend = () => localStorage.setItem(SAVE_KEY, reader.result.split(',')[1]);
                        reader.readAsDataURL(blob);
                    }
                });

                emulator.loadROM(romUint8);

                // Load existing Save State if present
                const savedData = localStorage.getItem(SAVE_KEY);
                if (savedData) {
                    const binaryString = atob(savedData);
                    const stateArray = new Uint8Array(binaryString.length);
                    for (let i = 0; i < binaryString.length; i++) {
                        stateArray[i] = binaryString.charCodeAt(i);
                    }
                    emulator.loadState(stateArray);
                }

                // Auto-save Loop every 15 seconds
                setInterval(() => {
                    if (emulator) emulator.saveState();
                }, 15000);

                // Kick off hyper-optimized render loop
                function tick() {
                    emulator.runFrame();
                    requestAnimationFrame(tick);
                }
                requestAnimationFrame(tick);

            } catch (err) {
                console.error("Emulator core crash:", err);
            }
        }

        // --- INPUT MAPPING ENGINE ---
        const BUTTON_A = 0;
        const BUTTON_B = 1;
        const BUTTON_SELECT = 2;
        const BUTTON_START = 3;
        const DPAD_UP = 4;
        const DPAD_DOWN = 5;
        const DPAD_LEFT = 6;
        const DPAD_RIGHT = 7;

        // Desktop Keyboard Controls
        const keyMap = {
            'space': BUTTON_A,
            'z': BUTTON_B,
            'shift': BUTTON_SELECT,
            'enter': BUTTON_START,
            'arrowup': DPAD_UP,
            'arrowdown': DPAD_DOWN,
            'arrowleft': DPAD_LEFT,
            'arrowright': DPAD_RIGHT
        };

        window.addEventListener('keydown', (e) => {
            initAudio();
            const key = e.key.toLowerCase() === ' ' ? 'space' : e.key.toLowerCase();
            if (emulator && keyMap[key] !== undefined) {
                e.preventDefault();
                emulator.setButton(0, keyMap[key], true);
            }
        });

        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase() === ' ' ? 'space' : e.key.toLowerCase();
            if (emulator && keyMap[key] !== undefined) {
                emulator.setButton(0, keyMap[key], false);
            }
        });

        // Mouse Controls
        window.addEventListener('mousedown', (e) => {
            initAudio();
            if (!emulator) return;
            if (e.button === 0) emulator.setButton(0, BUTTON_A, true);
            if (e.button === 2) emulator.setButton(0, BUTTON_B, true);
        });

        window.addEventListener('mouseup', (e) => {
            if (!emulator) return;
            if (e.button === 0) emulator.setButton(0, BUTTON_A, false);
            if (e.button === 2) emulator.setButton(0, BUTTON_B, false);
        });
        window.addEventListener('contextmenu', (e) => e.preventDefault());

        // Zero-Delay Mobile Touch Controls
        window.addEventListener('touchstart', (e) => {
            initAudio();
            if (!emulator) return;
            e.preventDefault();
            emulator.setButton(0, BUTTON_A, true);
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            if (!emulator) return;
            e.preventDefault();
            emulator.setButton(0, BUTTON_A, false);
        }, { passive: false });

        // Trigger loading sequence on first interaction
        window.addEventListener('click', () => {
            initAudio();
            if (!emulator) startEmulator();
        }, { once: true });
        window.addEventListener('touchstart', () => {
            initAudio();
            if (!emulator) startEmulator();
        }, { once: true });
    </script>
</body>
</html>
