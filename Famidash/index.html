<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Famidash</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        #game {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="game"></div>

    <script type="text/javascript">
        EJS_player = '#game'; 
        EJS_core = 'nes';
        
        // Live URL destination
        EJS_gameUrl = 'https://basicallydevyt.github.io/main/Famidash/Famidash.nes'; 
        
        EJS_startOnLoaded = true; 
        EJS_Volume = 1.0;         
        
        // --- HARDWARE ENGINE CONTROL KEYBINDS ---
        EJS_defaultControls = { 
            0: { 
                0: { 'value': 'space', 'value2': 'BUTTON_1' },      // A: Spacebar
                1: { 'value': 'z', 'value2': 'BUTTON_2' },          // B: Z Key
                2: { 'value': 'shift', 'value2': 'BUTTON_9' },      // Select: Shift (Any)
                3: { 'value': 'enter', 'value2': 'BUTTON_10' },     // Start: Enter
                4: { 'value': 'up arrow', 'value2': 'DPAD_UP' },    // D-Pad Up
                5: { 'value': 'down arrow', 'value2': 'DPAD_DOWN' },// D-Pad Down
                6: { 'value': 'left arrow', 'value2': 'DPAD_LEFT' },// D-Pad Left
                7: { 'value': 'right arrow', 'value2': 'DPAD_RIGHT'}// D-Pad Right
            }
        };

        EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
    </script>

    <script type="text/javascript" src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

    <script type="text/javascript">
        // --- MOUSE CLICK INPUT ENGINE ---
        window.addEventListener('DOMContentLoaded', () => {
            const gameContainer = document.getElementById('game');
            gameContainer.addEventListener('contextmenu', (e) => e.preventDefault());

            gameContainer.addEventListener('mousedown', (e) => {
                if (typeof __EJS_emulator === 'undefined') return;
                if (e.button === 0) __EJS_emulator.gamepad_set_button(0, 0, 1); // Left Click -> NES A
                else if (e.button === 2) __EJS_emulator.gamepad_set_button(0, 1, 1); // Right Click -> NES B
            });

            gameContainer.addEventListener('mouseup', (e) => {
                if (typeof __EJS_emulator === 'undefined') return;
                if (e.button === 0) __EJS_emulator.gamepad_set_button(0, 0, 0);
                else if (e.button === 2) __EJS_emulator.gamepad_set_button(0, 1, 0);
            });
        });
    </script>

</body>
</html>
