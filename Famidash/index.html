<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Famidash - TEST BUILD 5</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        #game {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="game"></div>

    <script type="text/javascript">
        // --- COOKIE ENGINE FUNCTIONS ---
        function setGameCookie(name, value) {
            const date = new Date();
            date.setTime(date.getTime() + (365 * 24 * 60 * 60 * 1000));
            document.cookie = name + "=" + encodeURIComponent(value) + "; expires=" + date.toUTCString() + "; path=/; SameSite=Strict";
        }

        function getGameCookie(name) {
            const matches = document.cookie.match(new RegExp("(?:^|; )" + name.replace(/([\.$?*|{}\(\)\[\]\\\/\+^])/g, '\\$1') + "=([^;]*)"));
            return matches ? decodeURIComponent(matches[1]) : null;
        }

        // --- CORE EMULATOR SETUP ---
        EJS_player = '#game';
        EJS_core = 'nes';
        EJS_gameUrl = 'https://basicallydevyt.github.io/main/Famidash/Famidash.nes'; 
        
        EJS_gameName = 'Famidash'; 
        EJS_gameID = 99124;        
        EJS_startOnLoaded = true;
        EJS_Volume = 1.0;        

        // --- HARDWARE ENGINE CONTROL KEYBINDS ---
        const defaultLayout = { 
            0: { 
                0: { 'value': 'z', 'value2': 'BUTTON_2' },          // Index 0: NES B -> Z Key
                2: { 'value': 'shift', 'value2': 'SELECT' },        // Index 2: Select -> Shift
                3: { 'value': 'enter', 'value2': 'START' },         // Index 3: Start -> Enter
                4: { 'value': 'up arrow', 'value2': 'DPAD_UP' },    // Index 4: D-Pad Up
                5: { 'value': 'down arrow', 'value2': 'DPAD_DOWN' },// Index 5: D-Pad Down
                6: { 'value': 'left arrow', 'value2': 'DPAD_LEFT' },// Index 6: D-Pad Left
                7: { 'value': 'right arrow', 'value2': 'DPAD_RIGHT'},// Index 7: D-Pad Right
                8: { 'value': 'space', 'value2': 'BUTTON_1' }       // Index 8: NES A -> Spacebar
            },
            1: {},
            2: {},
            3: {}
        };

        // --- COOKIE CONFIGURATION LOADER ---
        const savedConfig = getGameCookie('famidash_config_data');
        if (savedConfig) {
            try {
                EJS_defaultControls = JSON.parse(savedConfig);
            } catch(e) {
                EJS_defaultControls = defaultLayout;
            }
        } else {
            EJS_defaultControls = defaultLayout;
        }

        EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';

        // Hook: Records setting adjustments back to the cookie stream
        EJS_onSaveConfiguration = function(config) {
            if (config) {
                setGameCookie('famidash_config_data', JSON.stringify(config));
            }
        };

        // --- FULL AUTOMATIC SAVE/LOAD SYSTEM ---
        EJS_onGameStart = function() {
            // Check if an auto-save exists inside browser local memory
            const automaticSave = localStorage.getItem('famidash_auto_snapshot');
            if (automaticSave && typeof __EJS_emulator !== 'undefined') {
                setTimeout(() => {
                    try {
                        __EJS_emulator.loadState(automaticSave);
                        console.log("Auto-save loaded successfully!");
                    } catch(e) {
                        console.error("Auto-load deferred:", e);
                    }
                }, 1500); // Gives the core a 1.5-second warm-up buffer
            }

            // Fire an background engine sync interval every 5 seconds
            setInterval(() => {
                if (typeof __EJS_emulator !== 'undefined' && typeof __EJS_emulator.gameManager !== 'undefined') {
                    try {
                        // Grab live state directly from emulation memory structure
                        const liveState = __EJS_emulator.gameManager.getState();
                        if (liveState) {
                            localStorage.setItem('famidash_auto_snapshot', liveState);
                        }
                    } catch(err) {
                        // Core busy or frames syncing, skip step safely
                    }
                }
            }, 5000); 
        };
    </script>

    <script type="text/javascript" src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

    <script type="text/javascript">
        // --- MOUSE CLICK INPUT ENGINE ---
        window.addEventListener('DOMContentLoaded', () => {
            const gameContainer = document.getElementById('game');
            gameContainer.addEventListener('contextmenu', (e) => e.preventDefault());

            gameContainer.addEventListener('mousedown', (e) => {
                if (typeof __EJS_emulator === 'undefined') return;
                if (e.button === 0) __EJS_emulator.gamepad_set_button(0, 8, 1); 
                else if (e.button === 2) __EJS_emulator.gamepad_set_button(0, 0, 1); 
            });

            gameContainer.addEventListener('mouseup', (e) => {
                if (typeof __EJS_emulator === 'undefined') return;
                if (e.button === 0) __EJS_emulator.gamepad_set_button(0, 8, 0);
                else if (e.button === 2) __EJS_emulator.gamepad_set_button(0, 0, 0);
            });
        });
    </script>

</body>
</html>
