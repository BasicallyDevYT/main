<!DOCTYPE HTML>
<html>
  <head>
    <meta charset="utf-8">
    <title>Basically_Dev's Website</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #1a1a1a;
        color: #ffffff;
        text-align: center;
        padding: 20px;
      }

      .audio-container {
        position: absolute;
        top: 20px;
        right: 20px;
      }

      #music-btn {
        background-color: #262626;
        color: #ffffff;
        border: 1px solid #444444;
        padding: 8px 16px;
        border-radius: 20px;
        cursor: pointer;
        font-weight: bold;
        transition: all 0.3s ease;
      }

      #music-btn:hover {
        background-color: #333333;
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
      }

      .media-row {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        gap: 30px;
        margin-top: 30px;
        flex-wrap: wrap;
      }

      .card {
        background-color: #262626;
        border: 1px solid #444444;
        border-radius: 8px;
        padding: 15px;
        width: 320px;
        text-align: left;
      }

      .card.short-card {
        width: 220px;
      }

      .card img {
        width: 100%;
        border-radius: 6px;
      }

      .card h3 {
        margin: 10px 0 5px 0;
        font-size: 16px;
        color: #ffffff;
      }

      .badge {
        background-color: #ff0000;
        color: white;
        padding: 2px 6px;
        font-weight: bold;
        font-size: 12px;
        border-radius: 4px;
        display: inline-block;
        margin-bottom: 10px;
      }

      .badge.offline {
        background-color: #555555;
      }

      .fallback-box {
        width: 100%;
        height: 180px;
        background-color: #1f1f1f;
        border: 1px dashed #444444;
        border-radius: 6px;
      }

      .card.short-card .fallback-box {
        height: 320px;
      }

      button {
        padding: 10px 20px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="audio-container">
        <button id="music-btn" onclick="toggleMusic()">🎵 Play Music</button>
        <audio id="bg-music" src="./bgmusic.mp3" loop></audio>
    </div>

    <h1>My channel</h1>
    <p>This is my page about my Youtube channel!</p>
    
    <a href="https://basicallydevyt.github.io/main/"><button>Go to back home</button></a>

    <div class="media-row">
        <div class="card" id="recent-video-card">
            <div class="badge offline">LATEST VIDEO</div>
            <div id="video-content">Loading latest video...</div>
        </div>
        <div class="card short-card" id="recent-short-card">
            <div class="badge offline">SHORTS</div>
            <div id="short-content">Loading latest short...</div>
        </div>
    </div>

    <div class="media-row">
        <div class="card" id="recent-stream-card">
            <div class="badge offline">RECENT LIVE</div>
            <div id="recent-stream-content">Loading recent stream...</div>
        </div>
        <div class="card" id="live-stream-card">
            <div id="stream-badge" class="badge offline">OFFLINE</div>
            <div id="stream-content">Checking stream status...</div>
        </div>
    </div>

    <script>
        const API_KEY = 'AIzaSyDl7_5Yum1o0Gru_UBdZH2S1B4bCnit-ag'; // dumbass i made it so only basically_dev can use it, enjoy suffering
        const CHANNEL_ID = 'UCl-kI-6ma1msmRe9Ti0CHtA'; // don't care, redirects to my channel
        const UPLOADS_PLAYLIST_ID = 'UUl-kI-6ma1msmRe9Ti0CHtA';  // same thing

        function toggleMusic() {
            const audio = document.getElementById('bg-music');
            const btn = document.getElementById('music-btn');
            if (audio.paused) {
                audio.play();
                btn.innerText = "Pause Music";
            } else {
                audio.pause();
                btn.innerText = "Play Music";
            }
        }

        async function fetchLatestVideo() {
            const videoDiv = document.getElementById('video-content');
            const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=1&playlistId=${UPLOADS_PLAYLIST_ID}&key=${API_KEY}`;
            try {
                const response = await fetch(url);
                if (response.status === 403) return showVideoError("API Error 1: Permission Denied");
                if (!response.ok) return showVideoError("API Error 2: Could not connect");
                const data = await response.json();
                if (data.items && data.items.length > 0) {
                    const item = data.items[0].snippet;
                    const id = item.resourceId.videoId;
                    videoDiv.innerHTML = `
                        <a href="https://www.youtube.com/watch?v=${id}" target="_blank" style="text-decoration: none; color: inherit;">
                            <img src="${item.thumbnails.medium ? item.thumbnails.medium.url : item.thumbnails.default.url}" alt="${item.title}">
                            <h3>${item.title}</h3>
                        </a>`;
                } else {
                    showVideoError("API Error 4: No videos/streams was uploaded to the channel");
                }
            } catch (err) {
                showVideoError("API Error 3: Could not fetch videos/streams");
            }
        }

        function showVideoError(message) {
            document.getElementById('video-content').innerHTML = `
                <a href="https://www.youtube.com/@Basically_DevYT" target="_blank" style="text-decoration: none; color: inherit;">
                    <div class="fallback-box"></div><h3>${message}</h3>
                </a>`;
        }

        async function fetchLatestShort() {
            const shortDiv = document.getElementById('short-content');
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&maxResults=5&order=date&type=video&key=${API_KEY}`;
            try {
                const response = await fetch(url);
                if (response.status === 403) return showShortError("API Error 1: Permission Denied");
                if (!response.ok) return showShortError("API Error 2: Could not connect");
                const data = await response.json();
                let foundShort = false;
                if (data.items && data.items.length > 0) {
                    for (let item of data.items) {
                        if (item.snippet.title.toLowerCase().includes('#shorts') || item.snippet.description.toLowerCase().includes('#shorts')) {
                            shortDiv.innerHTML = `
                                <a href="https://www.youtube.com/shorts/${item.id.videoId}" target="_blank" style="text-decoration: none; color: inherit;">
                                    <div style="overflow: hidden; height: 320px; border-radius: 6px;">
                                        <img src="${item.snippet.thumbnails.high ? item.snippet.thumbnails.high.url : item.snippet.thumbnails.medium.url}" style="object-fit: cover; height: 100%;">
                                    </div>
                                    <h3>${item.snippet.title}</h3>
                                </a>`;
                            foundShort = true;
                            break;
                        }
                    }
                }
                if (!foundShort) showShortError("API Error 4: No videos/streams was uploaded to the channel");
            } catch (err) {
                showShortError("API Error 3: Could not fetch videos/streams");
            }
        }

        function showShortError(message) {
            document.getElementById('short-content').innerHTML = `
                <a href="https://www.youtube.com/@Basically_DevYT" target="_blank" style="text-decoration: none; color: inherit;">
                    <div class="fallback-box"></div><h3>${message}</h3>
                </a>`;
        }

        async function fetchRecentStream() {
            const streamDiv = document.getElementById('recent-stream-content');
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&type=video&eventType=completed&order=date&maxResults=1&key=${API_KEY}`;
            try {
                const response = await fetch(url);
                if (response.status === 403) return showRecentError("API Error 1: Permission Denied");
                if (!response.ok) return showRecentError("API Error 2: Could not connect");
                const data = await response.json();
                if (data.items && data.items.length > 0) {
                    const item = data.items[0].snippet;
                    streamDiv.innerHTML = `
                        <a href="https://www.youtube.com/watch?v=${data.items[0].id.videoId}" target="_blank" style="text-decoration: none; color: inherit;">
                            <img src="${item.thumbnails.medium.url}" alt="${item.title}">
                            <h3>${item.title}</h3>
                        </a>`;
                } else {
                    showRecentError("API Error 4: No videos/streams was uploaded to the channel");
                }
            } catch (err) {
                showRecentError("API Error 3: Could not fetch videos/streams");
            }
        }

        function showRecentError(message) {
            document.getElementById('recent-stream-content').innerHTML = `
                <a href="https://www.youtube.com/@Basically_DevYT" target="_blank" style="text-decoration: none; color: inherit;">
                    <div class="fallback-box"></div><h3>${message}</h3>
                </a>`;
        }

        async function fetchLiveStream() {
            const streamDiv = document.getElementById('stream-content');
            const badge = document.getElementById('stream-badge');
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&type=video&eventType=live&key=${API_KEY}`;
            try {
                const response = await fetch(url);
                if (response.status === 403) { streamDiv.innerHTML = '<h3>API Error 1: Permission Denied</h3>'; return; }
                if (!response.ok) { streamDiv.innerHTML = '<h3>API Error 2: Could not connect</h3>'; return; }
                const data = await response.json();
                if (data.items && data.items.length > 0) {
                    badge.innerText = "🔴 LIVE NOW";
                    badge.className = "badge"; 
                    streamDiv.innerHTML = `
                        <a href="https://www.youtube.com/watch?v=${data.items[0].id.videoId}" target="_blank" style="text-decoration: none; color: inherit;">
                            <img src="${data.items[0].snippet.thumbnails.medium.url}" alt="Live Stream">
                            <h3>${data.items[0].snippet.title}</h3>
                        </a>`;
                } else {
                    badge.innerText = "OFFLINE";
                    badge.className = "badge offline";
                    streamDiv.innerHTML = `
                        <a href="https://www.youtube.com/@Basically_DevYT" target="_blank" style="text-decoration: none; color: inherit;">
                            <div class="fallback-box"></div><h3>Not currently streaming live right now</h3>
                        </a>`;
                }
            } catch (err) {
                streamDiv.innerHTML = '<h3>API Error 3: Could not fetch videos/streams</h3>';
            }
        }

        fetchLatestVideo();
        fetchLatestShort();
        fetchRecentStream();
        fetchLiveStream();
    </script>
  </body>
</html>
