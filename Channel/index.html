<!DOCTYPE HTML>
<html>
  <head>
    <meta charset="utf-8">
    <title>Basically_Dev's Website</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #1a1a1a;
        color: #ffffff;
        text-align: center;
        padding: 20px;
      }

      .audio-container {
        position: absolute;
        top: 20px;
        right: 20px;
      }

      #music-btn {
        background-color: #262626;
        color: #ffffff;
        border: 1px solid #444444;
        padding: 8px 16px;
        border-radius: 20px;
        cursor: pointer;
        font-weight: bold;
        transition: all 0.3s ease;
      }

      #music-btn:hover {
        background-color: #333333;
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
      }

      .media-row {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        gap: 30px;
        margin-top: 30px;
        flex-wrap: wrap;
      }

      .card {
        background-color: #262626;
        border: 1px solid #444444;
        border-radius: 8px;
        padding: 15px;
        width: 320px;
        text-align: left;
      }

      .card.short-card {
        width: 220px;
      }

      .card img {
        width: 100%;
        border-radius: 6px;
      }

      .card h3 {
        margin: 10px 0 5px 0;
        font-size: 16px;
        color: #ffffff;
      }

      .badge {
        background-color: #ff0000;
        color: white;
        padding: 2px 6px;
        font-weight: bold;
        font-size: 12px;
        border-radius: 4px;
        display: inline-block;
        margin-bottom: 10px;
      }

      .badge.offline {
        background-color: #555555;
      }

      .fallback-box {
        width: 100%;
        height: 180px;
        background-color: #1f1f1f;
        border: 1px dashed #444444;
        border-radius: 6px;
      }

      .card.short-card .fallback-box {
        height: 320px;
      }

      button {
        padding: 10px 20px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="audio-container">
        <button id="music-btn" onclick="toggleMusic()">Play Music</button>
        <audio id="bg-music" src="./bgmusic.mp3" loop></audio>
    </div>

    <h1>My channel</h1>
    <p>This is my page about my Youtube channel!</p>
    
    <a href="https://basicallydevyt.github.io/main/"><button>Go to back home</button></a>

    <div class="media-row">
        <div class="card" id="recent-video-card">
            <div class="badge offline">LATEST VIDEO</div>
            <div id="video-content">Loading latest video...</div>
        </div>
        <div class="card short-card" id="recent-short-card">
            <div class="badge offline">SHORTS</div>
            <div id="short-content">Loading latest short...</div>
        </div>
    </div>

    <div class="media-row">
        <div class="card" id="recent-stream-card">
            <div class="badge offline">RECENT LIVE</div>
            <div id="recent-stream-content">Loading recent stream...</div>
        </div>
        <div class="card" id="live-stream-card">
            <div id="stream-badge" class="badge offline">OFFLINE</div>
            <div id="stream-content">Checking stream status...</div>
        </div>
    </div>

<script>
        const API_KEY = 'AIzaSyDl7_5Yum1o0Gru_UBdZH2S1B4bCnit-ag'; 
        const CHANNEL_ID = 'UCl-kI-6ma1msmRe9Ti0CHtA'; 
        const UPLOADS_PLAYLIST_ID = 'UUl-kI-6ma1msmRe9Ti0CHtA';  

        function toggleMusic() {
            const audio = document.getElementById('bg-music');
            const btn = document.getElementById('music-btn');
            if (audio.paused) {
                audio.play();
                btn.innerText = "Pause Music";
            } else {
                audio.pause();
                btn.innerText = "Play Music";
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            const audio = document.getElementById('bg-music');
            const btn = document.getElementById('music-btn');
            audio.play().then(() => {
                btn.innerText = "Pause Music";
            }).catch((error) => {
                btn.innerText = "Play Music";
            });
        });
        
        async function loadChannelData() {
            const videoDiv = document.getElementById('video-content');
            const shortDiv = document.getElementById('short-content');
            const streamDiv = document.getElementById('recent-stream-content');
            const liveDiv = document.getElementById('stream-content');
            const liveBadge = document.getElementById('stream-badge');

            // 1. Fetch recent uploads & shorts (Cost = 1 unit)
            const playlistUrl = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=10&playlistId=${UPLOADS_PLAYLIST_ID}&key=${API_KEY}`;
            
            try {
                const response = await fetch(playlistUrl);
                if (response.status === 403) {
                    showError('video-content', "API Error 1: Permission Denied");
                    showError('short-content', "API Error 1: Permission Denied");
                    return;
                }
                
                const data = await response.json();
                const items = data.items || [];

                if (items.length > 0) {
                    const latest = items[0].snippet;
                    const latestId = latest.resourceId.videoId;
                    videoDiv.innerHTML = createVideoHTML(latestId, latest.thumbnails.medium?.url || latest.thumbnails.default?.url, latest.title);

                    let foundShort = false;
                    for (let item of items) {
                        const snip = item.snippet;
                        if (snip.title.toLowerCase().includes('#shorts') || snip.description.toLowerCase().includes('#shorts')) {
                            const shortId = snip.resourceId.videoId;
                            shortDiv.innerHTML = `
                                <a href="https://www.youtube.com/shorts/${shortId}" target="_blank" style="text-decoration: none; color: inherit;">
                                    <div style="overflow: hidden; height: 320px; border-radius: 6px;">
                                        <img src="${snip.thumbnails.high?.url || snip.thumbnails.medium?.url}" style="object-fit: cover; height: 100%;">
                                    </div>
                                    <h3>${snip.title}</h3>
                                </a>`;
                            foundShort = true;
                            break;
                        }
                    }
                    if (!foundShort) showError('short-content', "No active shorts discovered");
                } else {
                    showError('video-content', "No uploads discovered");
                    showError('short-content', "No shorts discovered");
                }
            } catch (err) {
                showError('video-content', "API Error 2: Connection Failed");
                showError('short-content', "API Error 2: Connection Failed");
            }

            // 2. Fetch Recent Live Streams using the low-cost Activities endpoint (Cost = 1 unit)
            const activitiesUrl = `https://www.googleapis.com/youtube/v3/activities?part=snippet,contentDetails&channelId=${CHANNEL_ID}&maxResults=10&key=${API_KEY}`;
            try {
                const response = await fetch(activitiesUrl);
                if (response.status === 403) {
                    showError('recent-stream-content', "API Error 1: Permission Denied");
                    return;
                }
                const data = await response.json();
                const items = data.items || [];
                
                let foundRecentStream = false;

                for (let item of items) {
                    // Look for uploaded content or updates that match a live broadcast signature natively
                    if (item.snippet.type === 'upload' || item.snippet.type === 'recommendation') {
                        const title = item.snippet.title;
                        
                        // Dynamic matching: checks if this activity was your stream without hardcoding it
                        if (title.toLowerCase().includes('stream') || title.toLowerCase().includes('live') || title.toLowerCase().includes('dash')) {
                            const videoId = item.contentDetails.upload?.videoId || item.contentDetails.recommendation?.resourceId?.videoId;
                            
                            if (videoId) {
                                streamDiv.innerHTML = createVideoHTML(
                                    videoId, 
                                    item.snippet.thumbnails.medium?.url || item.snippet.thumbnails.default?.url, 
                                    title
                                );
                                foundRecentStream = true;
                                break;
                            }
                        }
                    }
                }

                if (!foundRecentStream) {
                    showError('recent-stream-content', "No recent streams found in channel history");
                }

            } catch (err) {
                showError('recent-stream-content', "API Error 2: Connection Failed");
            }

            // 3. Setup Default Live Stream Status View
            liveBadge.innerText = "OFFLINE";
            liveBadge.className = "badge offline";
            liveDiv.innerHTML = `
                <a href="https://www.youtube.com/@Basically_DevYT/live" target="_blank" style="text-decoration: none; color: inherit;">
                    <div class="fallback-box"></div><h3>Not currently streaming live right now</h3>
                </a>`;
        }

        function createVideoHTML(id, thumb, title) {
            return `
                <a href="https://www.youtube.com/watch?v=${id}" target="_blank" style="text-decoration: none; color: inherit;">
                    <img src="${thumb}" alt="${title}">
                    <h3>${title}</h3>
                </a>`;
        }

        function showError(elementId, message) {
            document.getElementById(elementId).innerHTML = `
                <a href="https://www.youtube.com/@Basically_DevYT" target="_blank" style="text-decoration: none; color: inherit;">
                    <div class="fallback-box"></div><h3>${message}</h3>
                </a>`;
        }

        loadChannelData();
    </script>
  </body>
</html>
