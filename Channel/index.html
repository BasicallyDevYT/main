<!DOCTYPE HTML>
<html>
  <head>
    <meta charset="utf-8">
    <title>Basically_Dev's Website</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #1a1a1a;
        color: #ffffff;
        text-align: center;
        padding: 20px;
      }

      .media-container {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        gap: 30px;
        margin-top: 40px;
        flex-wrap: wrap;
      }

      .card {
        background-color: #262626;
        border: 1px solid #444444;
        border-radius: 8px;
        padding: 15px;
        width: 320px;
        text-align: left;
      }

      .card img {
        width: 100%;
        border-radius: 6px;
      }

      .card h3 {
        margin: 10px 0 5px 0;
        font-size: 16px;
        color: #ffffff;
      }

      .badge {
        background-color: #ff0000;
        color: white;
        padding: 2px 6px;
        font-weight: bold;
        font-size: 12px;
        border-radius: 4px;
        display: inline-block;
        margin-bottom: 10px;
      }

      .badge.offline {
        background-color: #555555;
      }

      .fallback-box {
        width: 100%;
        height: 180px;
        background-color: #1f1f1f;
        border: 1px dashed #444444;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      button {
        padding: 10px 20px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>My channel</h1>
    <p>This is my page about my Youtube channel!</p>
    
    <a href="https://basicallydevyt.github.io/main/"><button>Go to back home</button></a>

    <div class="media-container">
        
        <div class="card" id="recent-video-card">
            <div class="badge offline">LATEST VIDEO</div>
            <div id="video-content">Loading latest video...</div>
        </div>

        <div class="card" id="live-stream-card">
            <div id="stream-badge" class="badge offline">OFFLINE</div>
            <div id="stream-content">Checking stream status...</div>
        </div>

    </div>

    <script>
        const API_KEY = 'AIzaSyDl7_5Yum1o0Gru_UBdZH2S1B4bCnit-ag'; // dumbass i made it so only basically_dev can use it, enjoy suffering
        const CHANNEL_ID = 'UCl-kI-6ma1msmRe9Ti0CHtA'; // don't care, redirects to my channel
        const UPLOADS_PLAYLIST_ID = 'UUl-kI-6ma1msmRe9Ti0CHtA';  // same thing

        async function fetchLatestVideo() {
            const videoDiv = document.getElementById('video-content');
            const url = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=1&playlistId=${UPLOADS_PLAYLIST_ID}&key=${API_KEY}`;
            
            try {
                const response = await fetch(url);
                
                if (response.status === 403) {
                    showVideoError("API Error 1: Permission Denied");
                    return;
                } else if (!response.ok) {
                    showVideoError("API Error 2: Could not connect");
                    return;
                }

                const data = await response.json();

                if (data.items && data.items.length > 0) {
                    const item = data.items[0].snippet;
                    const id = item.resourceId.videoId;
                    const title = item.title;
                    const thumb = item.thumbnails.medium ? item.thumbnails.medium.url : item.thumbnails.default.url;

                    videoDiv.innerHTML = `
                        <a href="https://www.youtube.com/watch?v=${id}" target="_blank" style="text-decoration: none; color: inherit;">
                            <img src="${thumb}" alt="${title}">
                            <h3>${title}</h3>
                        </a>
                    `;
                } else {
                    showVideoError("API Error 4: No videos/streams was uploaded to the channel");
                }
            } catch (err) {
                console.error(err);
                showVideoError("API Error 3: Could not fetch videos/streams");
            }
        }

        function showVideoError(message) {
            const videoDiv = document.getElementById('video-content');
            videoDiv.innerHTML = `
                <a href="https://www.youtube.com/@Basically_DevYT" target="_blank" style="text-decoration: none; color: inherit;">
                    <div class="fallback-box"></div>
                    <h3>${message}</h3>
                </a>
            `;
        }

        async function fetchLiveStream() {
            const streamDiv = document.getElementById('stream-content');
            const badge = document.getElementById('stream-badge');
            const url = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&type=video&eventType=live&key=${API_KEY}`;
            
            try {
                const response = await fetch(url);
                
                if (response.status === 403) {
                    showStreamError("API Error 1: Permission Denied");
                    return;
                } else if (!response.ok) {
                    showStreamError("API Error 2: Could not connect");
                    return;
                }

                const data = await response.json();

                if (data.items && data.items.length > 0) {
                    const item = data.items[0].snippet;
                    const id = data.items[0].id.videoId;
                    
                    badge.innerText = "🔴 LIVE NOW";
                    badge.className = "badge"; 
                    
                    streamDiv.innerHTML = `
                        <a href="https://www.youtube.com/watch?v=${id}" target="_blank" style="text-decoration: none; color: inherit;">
                            <img src="${item.thumbnails.medium.url}" alt="Live Stream">
                            <h3>${item.title}</h3>
                        </a>
                    `;
                } else {
                    badge.innerText = "OFFLINE";
                    badge.className = "badge offline";
                    streamDiv.innerHTML = `
                        <a href="https://www.youtube.com/@Basically_DevYT" target="_blank" style="text-decoration: none; color: inherit;">
                            <div class="fallback-box"></div>
                            <h3>Not currently streaming live right now</h3>
                        </a>
                    `;
                }
            } catch (err) {
                console.error(err);
                showStreamError("API Error 3: Could not fetch videos/streams");
            }
        }

        function showStreamError(message) {
            const streamDiv = document.getElementById('stream-content');
            streamDiv.innerHTML = `
                <a href="https://www.youtube.com/@Basically_DevYT" target="_blank" style="text-decoration: none; color: inherit;">
                    <div class="fallback-box"></div>
                    <h3>${message}</h3>
                </a>
            `;
        }

        fetchLatestVideo();
        fetchLiveStream();
    </script>
  </body>
</html>
