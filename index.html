<!DOCTYPE HTML>
<html>
  <head>
    <meta charset="utf-8">
    <title>Basically_Dev's Website</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #1a1a1a;
        color: #ffffff;
        text-align: center;
        padding: 40px 20px;
        margin: 0;
      }

      h1 {
        font-size: 2.5rem;
        margin-bottom: 10px;
      }

      p {
        font-size: 1.1rem;
        color: #cccccc;
        line-height: 1.6;
      }

      .dev-warning {
        color: #ff4d4d;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-size: 0.9rem;
        margin-top: 20px;
        margin-bottom: 30px;
      }

      /* Base layout row for standard buttons */
      .button-container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 15px;
        margin-top: 20px;
      }

      .button-container a {
        text-decoration: none;
      }

      /* Global base styles for ALL buttons */
      button {
        background-color: #2b2b2b; /* Slightly lighter than background so dark buttons are visible */
        color: #ffffff;
        border: none;
        padding: 12px 28px;
        font-size: 1rem;
        font-weight: bold;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 0 0px rgba(0, 0, 0, 0);
      }

      /* Default hover for standard dark buttons (Old Content & GitHub) */
      button:hover {
        background-color: #4a4a4a;
        transform: translateY(-2px);
        box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
      }

      button:active {
        transform: translateY(1px);
      }

      /* STYLES FOR THE DISCORD BUTTON */
      button.discord-btn {
        background-color: #5865F2; /* Discord Blurple */
      }

      button.discord-btn:hover {
        background-color: #4752C4;
        transform: translateY(-2px);
        box-shadow: 0 0 15px #5865F2, 0 0 30px #5865F2;
      }

      /* STYLES FOR THE CHANNEL RED WARNING BUTTON */
      button.warning-btn {
        background-color: #ff0000; /* Solid Red */
      }

      button.warning-btn:hover {
        background-color: #ff3333;
        transform: translateY(-2px);
        box-shadow: 0 0 15px #ff0000, 0 0 30px #ff0000; /* Clean Red Glow */
      }
    </style>
  </head>
  <body>
    <h1>Dev's website</h1>
    <p>
      Hi everyone! This is my Website.<br>
    </p>
    <p>
      This website is Open source!<br>
    </p>
    <p class="dev-warning">
      The channel tab is not guaranteed to work perfectly.
    </p>
    
    <div class="button-container">
      <a href="https://basicallydevyt.github.io/main/TermsOfService"><button class="discord-btn">Discord Server Terms of Service</button></a>
      <a href="https://basicallydevyt.github.io/main/Channel"><button class="warning-btn">Go to channel page</button></a>
      <a href="https://basicallydevyt.github.io/main/OldContent"><button>Go to Old Content page</button></a>
      <a href="https://github.com/BasicallyDevYT/main"><button>Github page</button></a>
    </div>
  </body>
</html>
