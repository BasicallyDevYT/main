<!DOCTYPE HTML>
<html>
  <head>
    <meta charset="utf-8">
    <title>Basically_Dev's Website</title>
    <meta http-equiv="Content-Security-Policy" content="frame-ancestors 'none';">
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #1a1a1a;
        color: #ffffff;
        text-align: center;
        padding: 40px 20px;
        margin: 0;
        position: relative;
      }

      h1 {
        font-size: 2.5rem;
        margin-bottom: 10px;
        margin-top: 60px; /* Pushes header down slightly to clear space for the login system */
      }

      p {
        font-size: 1.1rem;
        color: #cccccc;
        line-height: 1.6;
      }

      .section-title {
        font-size: 1.2rem;
        font-weight: bold;
        margin-top: 25px;
        margin-bottom: 15px;
        color: #ffffff;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .dev-warning {
        color: #ff4d4d;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-size: 0.9rem;
        margin-top: 20px;
        margin-bottom: 30px;
      }

      hr {
        border: 0;
        height: 1px;
        background: #333333;
        margin: 30px auto;
        width: 60%;
      }

      /* Base layout row for standard buttons */
      .button-container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 15px;
        margin-bottom: 20px;
      }

      .button-container a {
        text-decoration: none;
      }

      /* Global base styles for ALL buttons */
      button {
        background-color: #2b2b2b; /* Slightly lighter than background so dark buttons are visible */
        color: #ffffff;
        border: none;
        padding: 12px 28px;
        font-size: 1rem;
        font-weight: bold;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 0 0px rgba(0, 0, 0, 0);
      }

      /* Default hover for standard dark buttons (Old Content & GitHub) */
      button:hover {
        background-color: #4a4a4a;
        transform: translateY(-2px);
        box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
      }

      button:active {
        transform: translateY(1px);
      }

      /* STYLES FOR THE DISCORD BUTTON */
      button.discord-btn {
        background-color: #5865F2; /* Discord Blurple */
      }

      button.discord-btn:hover {
        background-color: #4752C4;
        transform: translateY(-2px);
        box-shadow: 0 0 15px #5865F2, 0 0 30px #5865F2;
      }

      /* STYLES FOR THE CHANNEL RED WARNING BUTTON */
      button.warning-btn {
        background-color: #ff0000; /* Solid Red */
      }

      button.warning-btn:hover {
        background-color: #ff3333;
        transform: translateY(-2px);
        box-shadow: 0 0 15px #ff0000, 0 0 30px #ff0000; /* Clean Red Glow */
      }

      /* --- TOP RIGHT CORNER AUTH HOOK LAYOUTS --- */
      .auth-corner-widget {
        position: absolute;
        top: 20px;
        right: 20px;
        z-index: 100;
      }

      /* Blue Standard Login Button */
      .top-login-btn {
        background-color: #1a73e8;
        color: #ffffff;
        text-decoration: none;
        padding: 10px 20px;
        font-weight: bold;
        font-size: 0.95rem;
        border-radius: 4px;
        display: inline-block;
        transition: background-color 0.2s, transform 0.2s;
      }

      .top-login-btn:hover {
        background-color: #1557b0;
        transform: translateY(-1px);
      }

      /* Profile Layout Label (Icon Right, Name Left) */
      .user-profile-label {
        display: flex;
        align-items: center;
        gap: 12px;
        background: #252525;
        padding: 6px 14px 6px 18px;
        border-radius: 30px;
        border: 1px solid #333;
      }

      .user-profile-label .username {
        font-weight: bold;
        font-size: 0.95rem;
        color: #ffffff;
      }

      .user-profile-label .avatar-circle {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        object-fit: cover;
        background-color: #444;
      }
    </style>

    <script>
      // --- Cookie Extraction Engine ---
      function getSharedCookie(name) {
        let nameEQ = name + "=";
        let ca = document.cookie.split(';');
        for(let i=0; i < ca.length; i++) {
          let c = ca[i];
          while (c.charAt(0) == ' ') c = c.substring(1, c.length);
          if (c.indexOf(nameEQ) == 0) {
            try {
              return JSON.parse(decodeURIComponent(c.substring(nameEQ.length, c.length)));
            } catch(e) {
              return null;
            }
          }
        }
        return null;
      }

      // --- Runtime Auth Visual Evaluator ---
      window.addEventListener('DOMContentLoaded', function() {
        const activeSession = getSharedCookie('user_session');
        const container = document.getElementById('auth-corner');

        if (activeSession) {
          // User is logged in: Generate the layout matching your mockup structure (Name on left, Icon on right)
          container.innerHTML = `
            <div class="user-profile-label">
              <span class="username">${activeSession.name}</span>
              <img class="avatar-circle" src="${activeSession.avatar}" alt="User Profile Image" style="border: 2px solid ${activeSession.provider === 'discord' ? '#5865F2' : '#4caf50'};">
            </div>
          `;
        } else {
          // Not logged in: Build clean blue destination redirect button
          container.innerHTML = `
            <a href="https://basicallydevyt.github.io/main/AccountService/?return=main" class="top-login-btn">Sign in</a>
          `;
        }
      });
    </script>
  </head>
  <body>

    <div id="auth-corner" class="auth-corner-widget"></div>

    <h1>Dev's website</h1>
    <p>
      Hi everyone! This is my Website.<br>
    </p>
    <p>
      This website is Open source!<br>
    </p>
    <p class="dev-warning">
      The channel tab is not guaranteed to work perfectly.
    </p>
    
    <div class="section-title">Links</div>
    <div class="button-container">
      <a href="https://basicallydevyt.github.io/main/OldContent"><button>Go to Old Content page</button></a>
      <a href="https://basicallydevyt.github.io/main/Famidash"><button>Famidash</button></a>
      <a href="https://github.com/BasicallyDevYT/main"><button>Github page</button></a>
    </div>

    <hr>

    <div class="section-title">Discord related links</div>
    <div class="button-container">
      <a href="https://basicallydevyt.github.io/main/TermsOfService"><button class="discord-btn">Discord Server Terms of Service</button></a>
      <a href="https://docs.google.com/forms/d/e/1FAIpQLSfZs-aEoI4pdXGqdyFzgzrUGFcVIFmCuQNfl8CBSrKZVrJ5Pg/viewform?usp=dialog"><button class="discord-btn">Moderator Questionnaire</button></a>
    </div>

    <hr>

    <div class="section-title">Dangerous links</div>
    <div class="button-container">
      <a href="https://basicallydevyt.github.io/main/Channel"><button class="warning-btn">Go to channel page</button></a>
    </div>

  </body>
</html>
