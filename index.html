<!DOCTYPE HTML>
<html>
  <head>
    <meta charset="utf-8">
    <title>Basically_Dev's Website</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #1a1a1a;
        color: #ffffff;
        text-align: center;
        padding: 40px 20px;
        margin: 0;
      }

      h1 {
        font-size: 2.5rem;
        margin-bottom: 10px;
      }

      p {
        font-size: 1.1rem;
        color: #cccccc;
        line-height: 1.6;
      }

      .dev-warning {
        color: #ff4d4d;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-size: 0.9rem;
        margin-top: 20px;
        margin-bottom: 30px;
      }

      /* Global base styles for ALL buttons */
      button {
        background-color: #ff0000;
        color: #ffffff;
        border: none;
        padding: 12px 28px;
        font-size: 1rem;
        font-weight: bold;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 0 0px rgba(255, 0, 0, 0);
      }

      /* Default hover for standard red buttons */
      button:hover {
        background-color: #ff3333;
        transform: translateY(-2px);
        box-shadow: 0 0 15px #ff0000, 0 0 30px #ff0000;
      }

      button:active {
        transform: translateY(1px);
      }

      /* TARGETED STYLES FOR ONLY THE DISCORD BUTTON */
      button.discord-btn {
        background-color: #5865F2; /* Discord Blurple */
      }

      /* Custom blue glow and color swap on hover */
      button.discord-btn:hover {
        background-color: #4752C4;
        box-shadow: 0 0 15px #5865F2, 0 0 30px #5865F2;
      }
    </style>
  </head>
  <body>
    <h1>Dev's website</h1>
    <p>
      Hi everyone! This is my Website.<br>
    </p>
    <p>
      This website is Open source!<br>
    </p>
    <p class="dev-warning">
      The channel tab is broken so it has been temporarily removed.
    </p>
    
    <a href="https://basicallydevyt.github.io/main/TermsOfService"><button class="discord-btn">Discord Server Terms of Service</button></a>
    <a href="https://basicallydevyt.github.io/main/OldContent"><button>Go to Old Content page</button></a>
    <a href="https://github.com/BasicallyDevYT/main"><button>Github page</button></a>
    <script>
      // <a href="https://basicallydevyt.github.io/main/Channel"><button>Go to channel page</button></a>
    </script>
  </body>
</html>
